<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ASCII Survivors</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #f7f7f7;
      --muted: #91a0b8;
      --panel: #111522;
      --accent: #6ae3ff;
      --hp: #ff5c5c;
      --xp: #89ff8f;
      --player: #73f0ff;
      --enemy: #ff6f7d;
      --bullet: #ffd166;
      --pickup: #6cff8d;
      --gem: #7dff95;
      --aura: #d4ff7a;
      --bat: #bda6ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: var(--bg);
      color: var(--fg);
      touch-action: manipulation;
      overscroll-behavior: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    button, .stick, .knob, canvas, .hotkey-slot {
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .app {
      height: 100svh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto auto;
      gap: 8px;
      padding: max(10px, env(safe-area-inset-top)) 10px max(14px, env(safe-area-inset-bottom));
      overflow: clip;
    }
    .hud {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      font-size: 15px;
    }
    .safehouse-controls {
      display: none;
      gap: 6px;
      align-items: center;
      margin-top: 6px;
    }
    .safehouse-controls button { padding: 6px 8px; }
    .bar {
      height: 10px;
      background: #1d2436;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 4px;
      position: relative;
    }
    .bar-stack .fill { position: absolute; left: 0; top: 0; height: 100%; }
    .fill { height: 100%; }
    .hp-fill { background: var(--hp); }
    .xp-fill { background: var(--xp); }
    .shield-fill { background: #53b7ff; }
    .death-note {
      position: fixed;
      left: 50%;
      bottom: max(10px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      min-height: 1.4em;
      color: #c8dcff;
      font-size: 14px;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      z-index: 7;
    }
    .screen-wrap {
      position: relative;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .play-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 8px;
      height: 100%;
      min-height: 0;
    }
    .play-layout.shop-open {
      grid-template-columns: minmax(0, 1fr) minmax(170px, 33%);
    }
    #screen {
      margin: 0 auto;
      background: #080b12;
      border: 1px solid #1e2a44;
      border-radius: 10px;
      width: 100%;
      max-height: 100%;
      aspect-ratio: 1 / 1;
      height: auto;
      min-height: min(100%, 280px);
      display: block;
    }
    .shop-panel {
      display: none;
      border: 1px solid #2a3552;
      border-radius: 10px;
      background: #0d1322;
      padding: 8px;
      overflow: hidden;
      min-height: 0;
    }
    .shop-panel h3 { margin: 0 0 8px; font-size: 15px; }
    .shop-choices { display: grid; gap: 6px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    @media (max-width: 760px) {
      .app { gap: 6px; padding-inline: 8px; }
      .controls { grid-template-columns: 1fr auto 1fr; }
      #aimStick { justify-self: end; }
      .stick { width: min(30vw, 120px); }
      .play-layout.shop-open { grid-template-columns: minmax(0, 1fr) minmax(140px, 40%); }
      .safehouse-controls button { padding: 5px 7px; }
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 10px;
    }
    .interact-btn { min-width: 72px; min-height: 48px; align-self: center; }
    .hotbar {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 6px;
      margin: 4px 0;
      align-items: stretch;
    }
    .nav-btn { min-width: 42px; }
    .hotkey-slot {
      border: 1px solid #2a3552;
      border-radius: 8px;
      background: #0d1322;
      color: #b9c7ec;
      font-size: 13px;
      padding: 6px;
      min-height: 56px;
      display: grid;
      gap: 2px;
      align-content: center;
      text-align: center;
      width: 100%;
      cursor: pointer;
    }
    .hotkey-slot.ready { border-color: #70d890; color: #c8ffd7; }
    .hotkey-slot.cooling { border-color: #7d83b7; color: #9fa8d8; }
    .hotkey-slot.empty { opacity: 0.7; }
    .stick {
      width: min(34vw, 148px);
      aspect-ratio: 1;
      border: 2px solid #2a3452;
      border-radius: 50%;
      position: relative;
      background: radial-gradient(circle at center, #12192b 0%, #0d1220 70%);
      touch-action: none;
    }
    .knob {
      width: 44%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #6a7fb4;
      opacity: 0.85;
      position: absolute;
      left: 28%;
      top: 28%;
      pointer-events: none;
    }
    button, label {
      font: inherit;
      color: var(--fg);
      background: var(--panel);
      border: 1px solid #2a3552;
      border-radius: 8px;
      padding: 8px 10px;
    }
    button:active { transform: scale(0.97); }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(2,5,10,0.88);
      display: none;
      place-items: center;
      z-index: 10;
      padding: 16px;
    }
    .card {
      max-width: 720px;
      width: 100%;
      border: 1px solid #2d3f6d;
      background: #0e1424;
      border-radius: 12px;
      padding: 12px;
    }
    .choices { display: grid; gap: 8px; }
    .choice { width: 100%; text-align: left; border-left: 4px solid var(--accent); }
    .choice.full-row { grid-column: 1 / -1; }
    .glyph { display: inline-block; }
  </style>
</head>
<body>
  <div class="app">
    <div class="hud">
      <div>
        <div>HP</div>
        <div class="bar bar-stack">
          <div id="hpFill" class="fill hp-fill" style="width:100%"></div>
          <div id="shieldFill" class="fill shield-fill" style="width:0%;opacity:0.85"></div>
          <div id="extraHpFill" class="fill xp-fill" style="width:0%;opacity:0.6"></div>
        </div>
        <div id="deathNote" class="death-note"></div>
        <div id="safehouseControls" class="safehouse-controls">
          <button id="levelPrev" type="button">⬇ Level</button>
          <button id="levelNext" type="button">⬆ Level</button>
          <button id="shopBtn" type="button">Upgrades ▶</button>
        </div>
      </div>
      <div id="stats">$0 · 00:00 · KOs 0</div>
    </div>

    <div class="screen-wrap">
      <div id="playLayout" class="play-layout">
        <canvas id="screen"></canvas>
        <aside id="shopPanel" class="shop-panel">
          <h3>Upgrades</h3>
          <div id="shopChoices" class="shop-choices"></div>
        </aside>
      </div>
    </div>

    <div id="hotbar" class="hotbar">
      <button id="abilityPrev" class="nav-btn" type="button">◀</button>
      <button id="abilitySlot" class="hotkey-slot" type="button"></button>
      <button id="abilityNext" class="nav-btn" type="button">▶</button>
    </div>

    <div class="controls">
      <div id="moveStick" class="stick"><div class="knob"></div></div>
      <button id="mobileInteract" class="interact-btn" type="button">SPACE</button>
      <div id="aimStick" class="stick"><div class="knob"></div></div>
    </div>
  </div>

  <div id="upgradeOverlay" class="overlay">
    <div class="card">
      <h3>Level Up — choose 1</h3>
      <div id="choices" class="choices"></div>
    </div>
  </div>

  <script>
    const GRID_W = 34, GRID_H = 30;
    const KILLS_PER_INTENSITY_LEVEL = 35;
    const MAX_ACTIVE_ENEMIES = 62;
    const CAMERA_ZOOM_RUN = 2.15;
    const CAMERA_ZOOM_SAFEHOUSE = 1.16;
    const BASE_PLAYER = {
      hp: 30, maxHp: 30, moveSpeed: 5.05, damage: 1, pickupRadius: 2.4, cooldownMs: 520,
      whipLevel: 0, garlicLevel: 0, stakesLevel: 1, batsLevel: 0
    };

    const state = {
      timeSec: 0,
      kills: 0,
      paused: false,
      level: 1,
      money: 0,
      room: 'run',
      highestUnlockedLevel: 1,
      selectedLevelIndex: 0,
      doorTouchSec: 0,
      interactPrompt: '',
      doorTarget: null,
      player: {
        x: 0, y: 0,
        hp: BASE_PLAYER.hp, maxHp: BASE_PLAYER.maxHp,
        shield: 0, maxShield: 0,
        moveSpeed: BASE_PLAYER.moveSpeed,
        damage: BASE_PLAYER.damage,
        pickupRadius: BASE_PLAYER.pickupRadius,
        cooldownMs: BASE_PLAYER.cooldownMs,
        lastShot: 0,
        aimX: 1, aimY: 0,
        whipLevel: BASE_PLAYER.whipLevel,
        garlicLevel: BASE_PLAYER.garlicLevel,
        stakesLevel: BASE_PLAYER.stakesLevel,
        batsLevel: BASE_PLAYER.batsLevel,
      },
      enemies: [], bullets: [], gems: [], pickups: [], fx: [], clones: [], forceFields: [],
      activeWeapon: 'rifle',
      selectedStartWeapon: 'knife',
      configs: { upgrades: [], enemyTypes: [], waves: [], levels: [] },
      levelDef: null,
      nextSpawnAt: 0,
      nextBossAt: 0,
      joysticks: {
        move: { x:0, y:0, active:false },
        aim:  { x:1, y:0, active:false }
      },
      walls: [],
      flowField: [],
      nextFlowUpdate: 0,
      levelStartTime: 0,
      levelIndex: 0,
      shapeName: '',
      movement: { vx: 0, vy: 0 },
      keyboard: { up: false, down: false, left: false, right: false },
      usingKeyboardMove: false,
      usingMouseAim: false,
      mouseAimActive: false,
      hurtFlash: 0,
      abilitySlots: [],
      abilityOrder: ['disabledAbility'],
      world: { roomX: 0, roomY: 0, cache: {}, doors: {} },
      phaseWalkUntil: 0,
      entityScale: 1,
      upgradeLevels: {},
      hotbarBound: false,
      selectedAbilityIndex: 0,
      shopOpen: false,
      shopOffers: [],
      fixtures: { armorStand: false, gunRack: false, vault: false, wardrobe: false },
      fixturePadTimers: { armorStand: 0, gunRack: 0, vault: 0 },
      fixtureUseTimers: { gunRack: 0, vault: 0 },
      bankMoney: 0,
      deathNote: '',
      effects: {
        sprintUntil: 0,
        spinUntil: 0,
        rampageUntil: 0,
        dualWieldUntil: 0,
        timeBubbleUntil: 0
      },
      traps: [],
      activeLances: [],
      camera: { x: GRID_W / 2, y: GRID_H / 2 },
      hoveredFixtureId: null
    };

    const PLAYER_EMOJIS = ['🥸','😎','🤠','😈','🤖','🦸','🧙','🧛','🧟','👾','🐱','🐸','🐵','🦊','🐼','🐨','🐙','🦖','🦄','🐧'];

    const EMOJIS = {
      player: PLAYER_EMOJIS[0], bullet: '🔸', gem: '💵', health: '🍗', chem: '🧪', clone: '🫥', trap: '🕸️',
      enemy: { bat: '🦇', zombie: '🧟‍♂️', ghost: '👻', juggernaut: '💀', demon: '👹', wizard: '🧙‍♂️', vampire: '🧛‍♂️', snake: '🐍', scorpion: '🦂', snowman: '⛄' }
    };

    const screen = document.getElementById('screen');
    const screenCtx = screen.getContext('2d');
    const hotbar = document.getElementById('hotbar');
    const abilitySlotBtn = document.getElementById('abilitySlot');
    const shieldFill = document.getElementById('shieldFill');
    const hpFill = document.getElementById('hpFill');
    const extraHpFill = document.getElementById('extraHpFill');
    const stats = document.getElementById('stats');
    const deathNote = document.getElementById('deathNote');
    const overlay = document.getElementById('upgradeOverlay');
    const choices = document.getElementById('choices');
    const safehouseControls = document.getElementById('safehouseControls');
    const shopBtn = document.getElementById('shopBtn');
    const playLayout = document.getElementById('playLayout');
    const shopPanel = document.getElementById('shopPanel');
    const shopChoices = document.getElementById('shopChoices');
    const controlsEl = document.querySelector('.controls');
    const mobileInteractBtn = document.getElementById('mobileInteract');

    function fmtTime(s){ const m = Math.floor(s/60); const r = Math.floor(s%60); return `${String(m).padStart(2,'0')}:${String(r).padStart(2,'0')}`; }

    const UPGRADE_COLORS = {
      weapon: '#ff8fab',
      gothic: '#d787ff',
      alchemy: '#7af1a4',
      wasteland: '#ffd166',
      relic: '#8bd3ff',
      ritual: '#ff9a76'
    };


    const WEAPON_DROPS = [
      { id: 'rifle', name: 'Wrench', glyph: '🔧', color: '#ffd166', cooldownMult: 1, damageMult: 1, speed: 11, life: 0.9, pierce: 0, spread: 0, projectiles: 1, ricochet: false, spin: true },
      { id: 'machineGun', name: 'Blade', glyph: '🗡️', color: '#9ae7ff', cooldownMult: 0.5, damageMult: 0.65, speed: 12, life: 0.8, pierce: 0, spread: 0.04, projectiles: 1, ricochet: false, spin: true },
      { id: 'laser', name: 'Axe', glyph: '🪓', color: '#ff7aff', cooldownMult: 2.1, damageMult: 3.8, speed: 14.5, life: 1.1, pierce: 1, spread: 0, projectiles: 1, ricochet: false, spin: true },
      { id: 'knife', name: 'Kitchen Knives', glyph: '🔪', color: '#ffb347', cooldownMult: 1.2, damageMult: 0.9, speed: 11.2, life: 0.7, pierce: 0, spread: 0.22, projectiles: 2, ricochet: false, spin: true },
      { id: 'axe', name: 'Throwing Axe', glyph: '🪓', color: '#ff9340', cooldownMult: 1.55, damageMult: 2.4, speed: 9.2, life: 0.62, pierce: 0, spread: 0.08, projectiles: 1, ricochet: false, spin: true, wallDamageMult: 2.8 },
      { id: 'dagger', name: 'Dagger', glyph: '🗡️', color: '#b8f2ff', cooldownMult: 1.05, damageMult: 1.1, speed: 12.8, life: 0.95, pierce: 3, spread: 0.1, projectiles: 1, ricochet: true, spin: true }
    ];

    const SAFEHOUSE_FIXTURES = [
      { id: 'armorStand', symbol: '🛡️', name: 'Armor Rack', desc: '+16 starting shield each run', cost: 100, x: 8.5, y: 8.5 },
      { id: 'gunRack', symbol: '🔫', name: 'Gun Rack', desc: 'Choose your starting weapon', cost: 100, x: GRID_W - 8.5, y: 8.5 },
      { id: 'vault', symbol: '🏦', name: 'Bank', desc: 'Store money between runs', cost: 100, x: GRID_W / 2, y: 5.5 },
      { id: 'wardrobe', symbol: '🧥', name: 'Wardrobe', desc: 'Swap your player emoji (20 options)', cost: 100, x: GRID_W / 2, y: GRID_H - 5.5 }
    ];

    const AUTO_AIM_ENABLED = true;
    const AUTO_FIRE_ENABLED = true;

    const ABILITY_META = {
      disabledAbility: { id: 'disabledAbility', key: '1', name: 'Ability Slot', desc: 'Abilities are disabled for now.', baseCooldown: 9500, maxLevel: 1, baseCharges: 0 }
    };

    function resizeScreenCanvas(){
      const dpr = window.devicePixelRatio || 1;
      const rect = screen.getBoundingClientRect();
      const width = Math.max(1, Math.floor(rect.width * dpr));
      const height = Math.max(1, Math.floor(rect.height * dpr));
      if(screen.width !== width || screen.height !== height){
        screen.width = width;
        screen.height = height;
      }
    }

    function worldScale(track = true){
      const zoom = state.room === 'run' ? CAMERA_ZOOM_RUN : CAMERA_ZOOM_SAFEHOUSE;
      const viewW = GRID_W / zoom;
      const viewH = GRID_H / zoom;
      const sx = screen.width / viewW;
      const sy = screen.height / viewH;
      const halfW = viewW * 0.5;
      const halfH = viewH * 0.5;
      const camX = clamp(state.player.x, halfW, GRID_W - halfW);
      const camY = clamp(state.player.y, halfH, GRID_H - halfH);
      if(track){
        state.camera.x += (camX - state.camera.x) * 0.14;
        state.camera.y += (camY - state.camera.y) * 0.14;
      }
      return {
        sx,
        sy,
        ox: screen.width * 0.5,
        oy: screen.height * 0.5,
        camX: track ? state.camera.x : camX,
        camY: track ? state.camera.y : camY
      };
    }

    function toScreen(x, y, sx, sy, ox = 0, oy = 0, camX = 0, camY = 0){
      return { x: ox + (x - camX) * sx, y: oy + (y - camY) * sy };
    }

    function drawCircle(ctx, x, y, r, color){
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function upgradeColor(up){
      if(up.theme && UPGRADE_COLORS[up.theme]) return UPGRADE_COLORS[up.theme];
      if(['whip','stakes','bats'].includes(up.id)) return UPGRADE_COLORS.weapon;
      if(['garlic'].includes(up.id)) return UPGRADE_COLORS.alchemy;
      if(['damage','fireRate'].includes(up.id)) return UPGRADE_COLORS.wasteland;
      return UPGRADE_COLORS.relic;
    }
    function rand(a,b){ return Math.random()*(b-a)+a; }
    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
    function dist(a,b){ const dx=a.x-b.x, dy=a.y-b.y; return Math.hypot(dx,dy); }
    function normalize(x,y){ const d=Math.hypot(x,y)||1; return {x:x/d, y:y/d}; }

    const SAVE_KEY = 'ascii-survivors-save-v2';

    function loadPersistentState(){
      try{
        const raw = localStorage.getItem(SAVE_KEY);
        if(!raw) return;
        const save = JSON.parse(raw);
        state.fixtures.armorStand = !!save.fixtures?.armorStand;
        state.fixtures.gunRack = !!save.fixtures?.gunRack;
        state.fixtures.vault = !!save.fixtures?.vault;
        state.fixtures.wardrobe = !!save.fixtures?.wardrobe;
        const emojiIndex = Number.isFinite(save.playerEmojiIndex) ? Math.floor(save.playerEmojiIndex) : 0;
        EMOJIS.player = PLAYER_EMOJIS[clamp(emojiIndex, 0, PLAYER_EMOJIS.length - 1)];
        state.bankMoney = Math.max(0, save.bankMoney || 0);
        state.highestUnlockedLevel = Math.max(1, save.highestUnlockedLevel || 1);
        state.selectedLevelIndex = clamp((save.selectedLevelIndex || 0), 0, state.highestUnlockedLevel - 1);
        if(save.selectedStartWeapon && WEAPON_DROPS.some(w=>w.id===save.selectedStartWeapon)) state.selectedStartWeapon = save.selectedStartWeapon;
      }catch(_err){}
    }

    function savePersistentState(){
      const payload = {
        fixtures: state.fixtures,
        selectedStartWeapon: state.selectedStartWeapon,
        bankMoney: state.bankMoney,
        highestUnlockedLevel: state.highestUnlockedLevel,
        selectedLevelIndex: state.selectedLevelIndex,
        playerEmojiIndex: PLAYER_EMOJIS.indexOf(EMOJIS.player)
      };
      localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
    }

    async function loadJson(path){ const r = await fetch(path); if(!r.ok) throw new Error(`Missing ${path}`); return r.json(); }
    async function boot(){
      loadPersistentState();
      state.configs.upgrades = await loadJson('./upgrades.json');
      state.configs.enemyTypes = await loadJson('./enemy-types.json');
      state.configs.waves = await loadJson('./waves.json');
      state.configs.levels = await loadJson('./levels.json');
      state.highestUnlockedLevel = Math.max(1, state.configs.levels.length);
      state.selectedLevelIndex = clamp(state.selectedLevelIndex, 0, state.highestUnlockedLevel - 1);
      state.levelDef = state.configs.levels[state.selectedLevelIndex] || state.configs.levels[0];
      state.levelStartTime = 0;
      state.nextBossAt = state.levelDef.bossIntervalSec;
      state.selectedLevelIndex = 0;
      state.levelDef = state.configs.levels[0] || state.levelDef;
      resetPlayer();
      setupSafehouse();
      bindStick('moveStick', 'move');
      bindStick('aimStick', 'aim');
      resizeScreenCanvas();
      window.addEventListener('resize', resizeScreenCanvas);
      initAbilitySlots();
      rebuildFromUpgrades();
      bindHotkeys();
      bindAbilityNavigator();
      bindSafehouseControls();
      bindDesktopPointerAim();
      mobileInteractBtn.addEventListener('click', handleInteractPress);
      updateControlVisibility();
      requestAnimationFrame(loop);
    }

    function initAbilitySlots(){
      state.abilitySlots = state.abilityOrder.map(id => ({
        id,
        level: 0,
        charges: 0,
        maxCharges: ABILITY_META[id].baseCharges,
        cooldownMs: ABILITY_META[id].baseCooldown,
        nextReadyAt: 0
      }));
    }

    function bindHotkeys(){
      window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if(['w','a','s','d'].includes(key)){
          if(key === 'w') state.keyboard.up = true;
          if(key === 'a') state.keyboard.left = true;
          if(key === 's') state.keyboard.down = true;
          if(key === 'd') state.keyboard.right = true;
          state.usingKeyboardMove = true;
          updateControlVisibility();
        }
        if(key === 'arrowleft' || key === 'arrowright' || key === 'q'){
          const dir = key === 'arrowleft' ? -1 : 1;
          selectAbility(dir);
        }
        if(key === 'e') activateSelectedAbility();
        if(key === ' ' || key === 'spacebar'){
          e.preventDefault();
          handleInteractPress();
        }
      });
      window.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        if(key === 'w') state.keyboard.up = false;
        if(key === 'a') state.keyboard.left = false;
        if(key === 's') state.keyboard.down = false;
        if(key === 'd') state.keyboard.right = false;
      });
    }

    function bindAbilityNavigator(){
      document.getElementById('abilityPrev').addEventListener('click', () => selectAbility(-1));
      document.getElementById('abilityNext').addEventListener('click', () => selectAbility(1));
      abilitySlotBtn.addEventListener('click', activateSelectedAbility);
    }

    function selectAbility(dir){
      if(!state.abilitySlots.length) return;
      const unlocked = state.abilitySlots.map((slot, i) => slot.level > 0 ? i : -1).filter(i => i >= 0);
      if(!unlocked.length) return;
      const current = unlocked.includes(state.selectedAbilityIndex) ? unlocked.indexOf(state.selectedAbilityIndex) : 0;
      const next = (current + dir + unlocked.length) % unlocked.length;
      state.selectedAbilityIndex = unlocked[next];
    }

    function activateSelectedAbility(){
      activateAbilitySlot(state.selectedAbilityIndex);
    }


    function updateControlVisibility(){
      const touchOnly = window.matchMedia?.('(pointer: coarse)').matches;
      controlsEl.style.display = (!state.usingKeyboardMove || touchOnly) ? 'grid' : 'none';
      mobileInteractBtn.style.display = touchOnly ? 'inline-block' : 'none';
    }

    function bindDesktopPointerAim(){
      screen.addEventListener('pointerdown', (e)=>{
        if(window.matchMedia?.('(pointer: coarse)').matches) return;
        if(e.button !== 0) return;
        state.mouseAimActive = true;
        state.usingMouseAim = true;
      });
      window.addEventListener('pointerup', (e)=>{
        if(e.button !== 0) return;
        state.mouseAimActive = false;
        state.usingMouseAim = false;
      });
      screen.addEventListener('pointermove', (e)=>{
        if(window.matchMedia?.('(pointer: coarse)').matches) return;
        const rect = screen.getBoundingClientRect();
        const { sx, sy, ox, oy, camX, camY } = worldScale(false);
        const nx = camX + (e.clientX - rect.left - ox) / sx;
        const ny = camY + (e.clientY - rect.top - oy) / sy;
        if(state.room === 'safehouse'){
          state.hoveredFixtureId = null;
          for(const fixture of SAFEHOUSE_FIXTURES){
            if(Math.hypot(nx - fixture.x, ny - fixture.y) < 0.95){
              state.hoveredFixtureId = fixture.id;
              break;
            }
          }
        }
        if(!state.mouseAimActive) return;
        const aim = normalize(nx - state.player.x, ny - state.player.y);
        state.player.aimX = aim.x;
        state.player.aimY = aim.y;
      });
      screen.addEventListener('pointerleave', ()=>{ state.hoveredFixtureId = null; });
    }

    function resetPlayer(){ state.player.x = GRID_W/2; state.player.y = GRID_H/2; }

    function bindSafehouseControls(){
      document.getElementById('levelPrev').addEventListener('click', ()=>{
        if(state.room !== 'safehouse') return;
        state.selectedLevelIndex = clamp(state.selectedLevelIndex - 1, 0, state.highestUnlockedLevel - 1);
        savePersistentState();
      });
      document.getElementById('levelNext').addEventListener('click', ()=>{
        if(state.room !== 'safehouse') return;
        state.selectedLevelIndex = clamp(state.selectedLevelIndex + 1, 0, state.highestUnlockedLevel - 1);
        savePersistentState();
      });
      document.getElementById('shopBtn').addEventListener('click', ()=>openCrateShop());
    }

    function cellBlocked(x, y){
      if(x < 0 || y < 0 || x >= GRID_W || y >= GRID_H) return true;
      return (state.walls[y]?.[x] || 0) > 0;
    }

    function randomOpenCell(){
      for(let i=0;i<300;i++){
        const x = Math.floor(rand(1, GRID_W - 1));
        const y = Math.floor(rand(1, GRID_H - 1));
        if(!cellBlocked(x, y)) return {x: x + 0.5, y: y + 0.5};
      }
      return {x: GRID_W / 2, y: GRID_H / 2};
    }

    function buildMaze(){
      const walls = Array.from({length: GRID_H}, (_, y) => Array.from({length: GRID_W}, (_, x) => x % 2 === 0 || y % 2 === 0 ? 12 : 0));
      const visited = Array.from({length: GRID_H}, () => Array(GRID_W).fill(false));
      const stack = [{x: 1, y: 1}];
      visited[1][1] = true;
      walls[1][1] = 0;
      const dirs = [[2,0],[-2,0],[0,2],[0,-2]];
      while(stack.length){
        const cur = stack[stack.length - 1];
        const moves = dirs
          .map(([dx,dy])=>({x:cur.x+dx,y:cur.y+dy,dx,dy}))
          .filter(n => n.x > 0 && n.y > 0 && n.x < GRID_W - 1 && n.y < GRID_H - 1 && !visited[n.y][n.x]);
        if(!moves.length){ stack.pop(); continue; }
        const pick = moves[Math.floor(Math.random() * moves.length)];
        visited[pick.y][pick.x] = true;
        walls[cur.y + pick.dy / 2][cur.x + pick.dx / 2] = 0;
        walls[pick.y][pick.x] = 0;
        stack.push({x: pick.x, y: pick.y});
      }
      return walls;
    }

    function emptyWallGrid(){ return Array.from({length: GRID_H}, () => Array(GRID_W).fill(0)); }
    function paintCell(walls, x, y, hp = 12){ if(x>=1&&y>=1&&x<GRID_W-1&&y<GRID_H-1) walls[y][x] = hp; }

    function aerateWalls(walls){
      // Keep maps traversable by punching lots of organic gaps through dense structures.
      for(let y=1;y<GRID_H-1;y++){
        for(let x=1;x<GRID_W-1;x++){
          if(!walls[y][x]) continue;
          const nearCenter = Math.hypot(x + 0.5 - GRID_W / 2, y + 0.5 - GRID_H / 2) < 6;
          const holeChance = nearCenter ? 0.28 : 0.2;
          if(Math.random() < holeChance) walls[y][x] = 0;
        }
      }

      // Carve extra channels so players and enemies rarely meet giant solid chunks.
      for(let i=0;i<8;i++){
        let cx = Math.floor(rand(2, GRID_W - 2));
        let cy = Math.floor(rand(2, GRID_H - 2));
        const steps = Math.floor(rand(8, 16));
        for(let s=0;s<steps;s++){
          paintCell(walls, cx, cy, 0);
          if(Math.random() < 0.45) paintCell(walls, cx + (Math.random() < 0.5 ? -1 : 1), cy, 0);
          if(Math.random() < 0.45) paintCell(walls, cx, cy + (Math.random() < 0.5 ? -1 : 1), 0);
          cx = clamp(cx + Math.floor(rand(-1.3, 1.3)), 2, GRID_W - 3);
          cy = clamp(cy + Math.floor(rand(-1.3, 1.3)), 2, GRID_H - 3);
        }
      }
      return walls;
    }

    function carveShape(shape){
      const walls = emptyWallGrid();
      const cx = Math.floor(GRID_W / 2), cy = Math.floor(GRID_H / 2);
      if(shape === 'skull'){
        for(let y=2;y<GRID_H-3;y++) for(let x=5;x<GRID_W-5;x++){
          const dx = (x-cx)/15, dy = (y-(cy-2))/9;
          if(dx*dx + dy*dy < 1) paintCell(walls, x, y, 8);
        }
        for(let y=cy-5;y<=cy-2;y++) for(const x of [cx-6,cx-5,cx+5,cx+6]) walls[y][x] = 0;
        for(let y=cy+2;y<cy+8;y++) for(let x=cx-7;x<=cx+7;x++) if((x+y)%3!==0) paintCell(walls, x, y, 6);
      }
      if(shape === 'sword'){
        for(let y=4;y<GRID_H-5;y++) for(let x=cx-1;x<=cx+1;x++) paintCell(walls, x, y, 8);
        for(let i=0;i<6;i++) for(let x=cx-3+i;x<=cx+3-i;x++) paintCell(walls, x, 3+i, 8);
        for(let x=cx-5;x<=cx+5;x++) paintCell(walls, x, GRID_H-6, 7);
        for(let y=GRID_H-5;y<GRID_H-2;y++) for(let x=cx-2;x<=cx+2;x++) paintCell(walls, x, y, 7);
      }
      if(shape === 'potion'){
        for(let y=4;y<9;y++) for(let x=cx-2;x<=cx+2;x++) paintCell(walls, x, y, 7);
        for(let y=8;y<GRID_H-4;y++) for(let x=6;x<GRID_W-6;x++){
          const dx=(x-cx)/14, dy=(y-(cy+2))/9;
          if(dx*dx + dy*dy < 1) paintCell(walls, x, y, 7);
        }
      }
      if(shape === 'shield'){
        for(let y=3;y<GRID_H-3;y++) for(let x=6;x<GRID_W-6;x++){
          const dx=(x-cx)/14, dy=(y-(cy-2))/10;
          if(dx*dx + dy*dy < 1.05 && y < cy+6-Math.abs(dx*3)) paintCell(walls, x, y, 8);
        }
      }
      if(shape === 'tree'){
        for(let y=5;y<cy+5;y++) for(let x=8;x<GRID_W-8;x++){
          const dx=(x-cx)/(15-(y-5)*0.4), dy=(y-(cy-2))/10;
          if(dx*dx + dy*dy < 1) paintCell(walls, x, y, 6);
        }
        for(let y=cy+4;y<GRID_H-2;y++) for(let x=cx-2;x<=cx+2;x++) paintCell(walls, x, y, 9);
      }
      if(shape === 'mountain'){
        for(let y=4;y<GRID_H-2;y++){
          const width = Math.floor((y-3) * 1.25);
          for(let x=cx-width; x<=cx+width; x++) if(Math.random() > 0.08 || y > cy+4) paintCell(walls, x, y, 8);
        }
      }
      return walls;
    }

    function generateWalls(){
      const patterns = [
        { name: 'Concentric Circles', build: () => {
          const walls = emptyWallGrid();
          const cx = GRID_W / 2, cy = GRID_H / 2;
          for(let y=1;y<GRID_H-1;y++){
            for(let x=1;x<GRID_W-1;x++){
              const d = Math.hypot(x + 0.5 - cx, y + 0.5 - cy);
              if((d > 4 && d < 5.1) || (d > 8 && d < 9.2) || (d > 12 && d < 13.1)) paintCell(walls, x, y, 7);
            }
          }
          return walls;
        }},
        { name: 'Concentric Squares', build: () => {
          const walls = emptyWallGrid();
          for(const inset of [3, 7, 11]){
            for(let x=inset;x<GRID_W-inset;x++){
              paintCell(walls, x, inset, 8);
              paintCell(walls, x, GRID_H - 1 - inset, 8);
            }
            for(let y=inset;y<GRID_H-inset;y++){
              paintCell(walls, inset, y, 8);
              paintCell(walls, GRID_W - 1 - inset, y, 8);
            }
          }
          return walls;
        }},
        { name: 'Triangle Scatter', build: () => {
          const walls = emptyWallGrid();
          for(let i=0;i<28;i++){
            const cx = Math.floor(rand(3, GRID_W - 3));
            const cy = Math.floor(rand(3, GRID_H - 3));
            const h = Math.floor(rand(2, 4));
            for(let row=0;row<h;row++){
              for(let x=cx-row;x<=cx+row;x++) paintCell(walls, x, cy + row, 6 + (row % 2));
            }
          }
          return walls;
        }},
        { name: 'Castle Courtyard', build: () => {
          const walls = emptyWallGrid();
          for(let x=4;x<GRID_W-4;x++){ paintCell(walls, x, 4, x%4===0?999:8); paintCell(walls, x, GRID_H-5, x%4===0?999:8); }
          for(let y=4;y<GRID_H-4;y++){ paintCell(walls, 4, y, y%4===0?999:8); paintCell(walls, GRID_W-5, y, y%4===0?999:8); }
          for(let y=9;y<GRID_H-8;y++) for(let x=9;x<GRID_W-9;x++) if((x+y)%7===0) paintCell(walls, x, y, 7);
          return walls;
        }},
        { name: 'Blueprint Blocks', build: () => {
          const walls = emptyWallGrid();
          const blocks = [[6,6,8,6],[18,6,10,5],[7,16,9,7],[20,15,8,8]];
          for(const [sx,sy,w,h] of blocks){
            for(let x=sx;x<sx+w;x++){ paintCell(walls,x,sy,8); paintCell(walls,x,sy+h-1,8); }
            for(let y=sy;y<sy+h;y++){ paintCell(walls,sx,y,8); paintCell(walls,sx+w-1,y,8); }
          }
          return walls;
        }},
        { name: 'Spiral Swirl', build: () => {
          const walls = emptyWallGrid();
          let minX=3,minY=3,maxX=GRID_W-4,maxY=GRID_H-4;
          while(minX<maxX && minY<maxY){
            for(let x=minX;x<=maxX;x++) paintCell(walls,x,minY,7);
            for(let y=minY;y<=maxY;y++) paintCell(walls,maxX,y,7);
            for(let x=maxX;x>=minX+2;x--) paintCell(walls,x,maxY,7);
            for(let y=maxY;y>=minY+2;y--) paintCell(walls,minX,y,7);
            minX+=3; minY+=2; maxX-=3; maxY-=2;
          }
          return walls;
        }},
        { name: 'Shitty Maze', build: buildMaze },
        { name: 'Shape Mash', build: () => carveShape(['skull','sword','potion','shield','tree','mountain'][Math.floor(Math.random()*6)]) }
      ];
      const pick = patterns[Math.floor(Math.random() * patterns.length)];
      state.shapeName = pick.name;
      return aerateWalls(pick.build());
    }

    function openRoomExits(){
      return;
    }

    function rebuildLevelGeometry(){
      const prevX = clampInsideBounds(state.player.x || GRID_W / 2, 0.5, GRID_W);
      const prevY = clampInsideBounds(state.player.y || GRID_H / 2, 0.5, GRID_H);
      const roomKey = `${state.world.roomX},${state.world.roomY}`;
      const cachedWalls = state.world.cache[roomKey];
      state.walls = cachedWalls ? cachedWalls.map(row => [...row]) : generateWalls();
      openRoomExits();
      const px = clamp(Math.floor(prevX), 1, GRID_W - 2);
      const py = clamp(Math.floor(prevY), 1, GRID_H - 2);
      const spawn = cellBlocked(px, py) ? randomOpenCell() : { x: prevX, y: prevY };
      state.player.x = spawn.x;
      state.player.y = spawn.y;
      clearSpawnArea(spawn.x, spawn.y, 1.9);
      state.flowField = [];
      state.nextFlowUpdate = 0;
      state.movement.vx = 0;
      state.movement.vy = 0;
      const door = roomDoor();
      state.walls[door.y][door.x] = 0;
      clearSpawnArea(door.x + 0.5, door.y + 0.5, 1.4);
      state.world.cache[roomKey] = state.walls.map(row => [...row]);
    }

    function enforceBorderWalls(){
      for(let x=0;x<GRID_W;x++){
        state.walls[0][x] = 9;
        state.walls[GRID_H-1][x] = 9;
      }
      for(let y=0;y<GRID_H;y++){
        state.walls[y][0] = 9;
        state.walls[y][GRID_W-1] = 9;
      }
    }

    function clearSpawnArea(x, y, radius = 2){
      for(let gy=Math.floor(y-radius); gy<=Math.ceil(y+radius); gy++){
        for(let gx=Math.floor(x-radius); gx<=Math.ceil(x+radius); gx++){
          if(gx <= 0 || gy <= 0 || gx >= GRID_W - 1 || gy >= GRID_H - 1) continue;
          if(Math.hypot(gx + 0.5 - x, gy + 0.5 - y) <= radius + 0.4) state.walls[gy][gx] = 0;
        }
      }
    }

    function setupSafehouse(){
      state.room = 'safehouse';
      state.shopOpen = false;
      state.walls = emptyWallGrid();
      enforceBorderWalls();
      state.player.x = clampInsideBounds(state.player.x || GRID_W / 2, 0.32, GRID_W);
      state.player.y = clampInsideBounds(state.player.y || GRID_H - 4, 0.32, GRID_H);
      state.walls[1][Math.floor(GRID_W / 2)] = 0;
      state.enemies = []; state.bullets = []; state.gems = []; state.pickups = []; state.forceFields = [];
      state.fx = []; state.traps = []; state.activeLances = []; state.clones = [];
      state.hoveredFixtureId = null;
      state.camera.x = state.player.x;
      state.camera.y = state.player.y;
      state.doorTouchSec = 0;
      state.fixturePadTimers = { armorStand: 0, gunRack: 0, vault: 0 };
      state.fixtureUseTimers = { gunRack: 0, vault: 0 };
      state.world.doors.run = null;
    }

    function startRun(){
      state.room = 'run';
      state.shopOpen = false;
      state.levelDef = state.configs.levels[state.selectedLevelIndex] || state.configs.levels[0];
      state.levelStartTime = 0;
      state.timeSec = 0;
      state.nextBossAt = state.levelDef.bossIntervalSec;
      state.nextSpawnAt = 0;
      state.kills = 0;
      state.enemies = []; state.bullets = []; state.gems = []; state.pickups = [];
      state.activeWeapon = state.fixtures.gunRack ? state.selectedStartWeapon : 'knife';
      state.player.shield = state.player.maxShield;
      state.deathNote = '';
      state.world.roomX = 0; state.world.roomY = 0;
      state.world.cache = {};
      state.world.doors = {};
      state.world.doors.run = randomRunDoor();
      rebuildLevelGeometry();
      state.camera.x = state.player.x;
      state.camera.y = state.player.y;
      state.doorTouchSec = 0;
      state.fixturePadTimers = { armorStand: 0, gunRack: 0, vault: 0 };
      state.fixtureUseTimers = { gunRack: 0, vault: 0 };
    }

    function randomRunDoor(){
      const margin = 2;
      const side = Math.floor(Math.random() * 4);
      if(side === 0) return { x: Math.floor(rand(margin, GRID_W - margin)), y: 1 };
      if(side === 1) return { x: GRID_W - 2, y: Math.floor(rand(margin, GRID_H - margin)) };
      if(side === 2) return { x: Math.floor(rand(margin, GRID_W - margin)), y: GRID_H - 2 };
      return { x: 1, y: Math.floor(rand(margin, GRID_H - margin)) };
    }

    function updateFlowField(){
      const tx = clamp(Math.floor(state.player.x), 0, GRID_W - 1);
      const ty = clamp(Math.floor(state.player.y), 0, GRID_H - 1);
      const flow = Array.from({length: GRID_H}, () => Array(GRID_W).fill(Infinity));
      const queue = [{x: tx, y: ty}];
      flow[ty][tx] = 0;
      for(let i=0;i<queue.length;i++){
        const c = queue[i], base = flow[c.y][c.x] + 1;
        for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
          const nx = c.x + dx, ny = c.y + dy;
          if(nx < 0 || ny < 0 || nx >= GRID_W || ny >= GRID_H || cellBlocked(nx, ny)) continue;
          if(base < flow[ny][nx]){ flow[ny][nx] = base; queue.push({x:nx,y:ny}); }
        }
      }
      state.flowField = flow;
    }

    function bindStick(id, key){
      const el = document.getElementById(id), knob = el.querySelector('.knob');
      const joy = state.joysticks[key];
      function update(clientX, clientY){
        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
        let dx = (clientX - cx) / (rect.width/2), dy = (clientY - cy) / (rect.height/2);
        const mag = Math.hypot(dx,dy); if(mag > 1){ dx/=mag; dy/=mag; }
        joy.x = dx; joy.y = dy;
        knob.style.left = `${28 + dx * 26}%`;
        knob.style.top = `${28 + dy * 26}%`;
      }
      function clear(){ joy.x=0; joy.y=0; joy.active=false; knob.style.left='28%'; knob.style.top='28%'; }
      el.addEventListener('pointerdown', e=>{ e.preventDefault(); joy.active=true; state.usingKeyboardMove = false; updateControlVisibility(); update(e.clientX,e.clientY); el.setPointerCapture(e.pointerId); }, { passive: false });
      el.addEventListener('pointermove', e=> { if (joy.active) { e.preventDefault(); update(e.clientX,e.clientY); } }, { passive: false });
      el.addEventListener('pointerup', clear);
      el.addEventListener('pointercancel', clear);
    }

    function getEnemyType(id){ return state.configs.enemyTypes.find(e => e.id === id); }

    function runIntensityTier(){
      return Math.floor(state.kills / KILLS_PER_INTENSITY_LEVEL);
    }

    function effectiveCombatTime(){
      return state.timeSec + state.selectedLevelIndex * 36 + runIntensityTier() * 22;
    }

    function levelProgression(){
      const level = currentDifficultyLevel();
      const combatTime = effectiveCombatTime();
      const levelMul = 1 + (level - 1) * 0.32;
      const timeMul = 1 + Math.min(1.5, combatTime / 85);
      const earlyHpEase = 0.88 + Math.min(0.12, combatTime / 500);
      return {
        hp: levelMul * earlyHpEase * (1 + Math.min(1.3, combatTime / 120)),
        speed: 1 + (level - 1) * 0.08 + Math.min(0.42, combatTime / 260),
        damage: 1 + (level - 1) * 0.12 + Math.min(0.55, combatTime / 170),
        spawn: Math.max(0.2, 1 / (levelMul * timeMul))
      };
    }

    function getWeaponDrop(id){ return WEAPON_DROPS.find(w => w.id === id) || WEAPON_DROPS[0]; }
    function randomWeaponDrop(){ return WEAPON_DROPS[Math.floor(Math.random() * WEAPON_DROPS.length)]; }
    function pickWeighted(mix){
      const total = mix.reduce((s,m)=>s+m.weight,0); let roll = Math.random()*total;
      for(const m of mix){ roll -= m.weight; if(roll <= 0) return m.type; }
      return mix[0].type;
    }

    function currentWave(){
      const t = effectiveCombatTime();
      return state.configs.waves.find(w => t >= w.startSec && t < w.endSec) || state.configs.waves[state.configs.waves.length-1];
    }

    function spawnEnemy(typeId, groupAnchor = null, opts = {}){
      const t = getEnemyType(typeId); if(!t) return;
      if(!t.boss && state.enemies.length >= MAX_ACTIVE_ENEMIES) return;
      const minPlayerDistance = opts.minPlayerDistance || 0;
      let x=0,y=0;
      if(groupAnchor){
        x = clamp(groupAnchor.x + rand(-1.05, 1.05), 1, GRID_W - 2);
        y = clamp(groupAnchor.y + rand(-1.05, 1.05), 1, GRID_H - 2);
      }
      const spawnRadius = 0.3 * (t.size || 1);
      let foundSpawn = false;
      for(let i=0;i<60;i++){
        if(!groupAnchor){
          const side = Math.floor(Math.random()*4);
          if(side===0){ x=rand(1.2,GRID_W-1.2); y=1.2; }
          if(side===1){ x=GRID_W-1.2; y=rand(1.2,GRID_H-1.2); }
          if(side===2){ x=rand(1.2,GRID_W-1.2); y=GRID_H-1.2; }
          if(side===3){ x=1.2; y=rand(1.2,GRID_H-1.2); }
        }
        const nearPlayer = minPlayerDistance > 0 && Math.hypot(state.player.x - x, state.player.y - y) < minPlayerDistance;
        if(!circleBlocked(x, y, spawnRadius) && !nearPlayer){ foundSpawn = true; break; }
        if(groupAnchor){
          x = clamp(groupAnchor.x + rand(-2, 2), 1.2, GRID_W - 1.2);
          y = clamp(groupAnchor.y + rand(-2, 2), 1.2, GRID_H - 1.2);
        }
      }
      if(!foundSpawn){
        const open = randomOpenCell();
        x = open.x;
        y = open.y;
      }
      const prog = levelProgression();
      state.enemies.push({
        x,y,type:t.id,char:t.char,color:t.color,
        hp:t.hp * prog.hp,
        speed:t.speed * 1.2 * prog.speed,
        touchDamage:t.touchDamage * prog.damage,
        xp:Math.max(1, Math.round(t.xp * (1 + (state.selectedLevelIndex * 0.15)))),
        boss: !!t.boss,
        hitFlash:0,
        size: t.size || 1,
        canBreakWalls: t.canBreakWalls !== false,
        passWalls: !!t.passWalls,
        wallDamage: t.wallDamage || 0.6,
        dashWindup: 0,
        dashCooldown: 0,
        dashDirX: 0,
        dashDirY: 0,
        dashing: 0,
        wallHitTicks: 0,
        forceCooldown: rand(2.2, 4.5),
        ranged: !!t.ranged,
        shotChar: t.shotChar,
        shotSpeed: t.shotSpeed,
        castCooldown: t.castCooldown,
        range: t.range,
        modulates: !!t.modulates,
        summoner: !!t.summoner,
        forceField: !!t.forceField
      });
    }

    function breakWallTowardEntity(entity, tx, ty, dt){
      const nx = normalize(tx - entity.x, ty - entity.y);
      const wx = entity.x + nx.x * 0.8;
      const wy = entity.y + nx.y * 0.8;
      const damage = Math.max(0.1, entity.wallDamage * dt * 10);
      return damageWallAt(wx, wy, damage);
    }

    function crushWallsAround(entity, radius, dt, mult = 1){
      const dmg = Math.max(0.12, (entity.wallDamage || 0.6) * dt * 8.5 * mult);
      let crushed = false;
      for(let gy=Math.floor(entity.y - radius); gy<=Math.ceil(entity.y + radius); gy++){
        for(let gx=Math.floor(entity.x - radius); gx<=Math.ceil(entity.x + radius); gx++){
          if(gx <= 0 || gy <= 0 || gx >= GRID_W - 1 || gy >= GRID_H - 1) continue;
          if(Math.hypot(gx + 0.5 - entity.x, gy + 0.5 - entity.y) <= radius){
            crushed = damageWallAt(gx + 0.5, gy + 0.5, dmg) || crushed;
          }
        }
      }
      return crushed;
    }

    function moveWithWallCollision(entity, moveX, moveY, radius, opts = {}){
      const nextX = clampInsideBounds(entity.x + moveX, radius, GRID_W);
      const nextY = clampInsideBounds(entity.y + moveY, radius, GRID_H);
      const canBreak = !!opts.canBreakWalls;
      const breakMult = opts.breakMult || 1;
      const dt = opts.dt || 0;

      const hitTarget = () => {
        if(!canBreak) return false;
        const targetX = entity.x + Math.sign(moveX || 0.0001) * (radius + 0.38);
        const targetY = entity.y + Math.sign(moveY || 0.0001) * (radius + 0.38);
        const proxy = { x: entity.x, y: entity.y, wallDamage: (entity.wallDamage || 0.6) * breakMult };
        return breakWallTowardEntity(proxy, targetX, targetY, dt);
      };

      if(!circleBlocked(nextX, nextY, radius)){
        entity.x = nextX;
        entity.y = nextY;
        return;
      }

      let moved = false;
      const axisX = !circleBlocked(nextX, entity.y, radius);
      const axisY = !circleBlocked(entity.x, nextY, radius);
      if(axisX){ entity.x = nextX; moved = true; }
      if(axisY){ entity.y = nextY; moved = true; }
      if(!moved) hitTarget();
    }

    function spawnParticles(kind, x, y, amount){
      if(state.fx.length > 300) amount = Math.min(amount, 2);
      const configs = {
        blood: { chars: ['🩸', '•'], colors: ['#ff3b3b', '#ff4a4a', '#ff5a5a'], speed: [2.2, 5.3], life: [0.22, 0.55] },
        blast: { chars: ['✨', '✴️', '💥'], colors: ['#ffd166', '#ff9f40', '#ff6b35'], speed: [0.8, 2.6], life: [0.15, 0.55] },
        spark: { chars: ['✦', '·'], colors: ['#ffe08a', '#ffd166', '#fff1b5'], speed: [1.5, 3.5], life: [0.1, 0.24] },
        heal: { chars: ['💖', '✨'], colors: ['#ff6fcf', '#ff9edf', '#ffc4ee'], speed: [0.5, 1.8], life: [0.2, 0.45] },
        damage: { chars: ['❗', '💢'], colors: ['#ff6565', '#ff3535'], speed: [1.2, 3.4], life: [0.16, 0.34] }
      };
      const cfg = configs[kind];
      if(!cfg) return;
      for(let i=0;i<amount;i++){
        const a = Math.random() * Math.PI * 2;
        const speed = rand(cfg.speed[0], cfg.speed[1]);
        state.fx.push({
          x,
          y,
          vx: Math.cos(a) * speed,
          vy: Math.sin(a) * speed,
          life: rand(cfg.life[0], cfg.life[1]),
          char: cfg.chars[Math.floor(Math.random() * cfg.chars.length)],
          color: cfg.colors[Math.floor(Math.random() * cfg.colors.length)]
        });
      }
    }

    function fxLogic(dt){
      for(let i=state.fx.length-1;i>=0;i--){
        const f = state.fx[i];
        f.life -= dt;
        f.x += f.vx * dt;
        f.y += f.vy * dt;
        f.vx *= 0.9;
        f.vy *= 0.9;
        if(f.life <= 0) state.fx.splice(i, 1);
      }
    }

    function fire(){
      const p = state.player;
      const now = performance.now();
      const canFire = AUTO_FIRE_ENABLED || state.joysticks.aim.active || state.usingMouseAim;
      const weapon = getWeaponDrop(state.activeWeapon);
      const bubbleHaste = state.effects.timeBubbleUntil > state.timeSec ? 0.65 : 1;
      const smgBoost = weapon.id === 'smg' ? Math.max(0.55, 1 - (p.smgRate || 0)) : 1;
      const cooldown = Math.max(70, p.cooldownMs * weapon.cooldownMult * bubbleHaste * smgBoost);
      if(!canFire || now - p.lastShot < cooldown) return;
      p.lastShot = now;
      const aim = normalize(p.aimX, p.aimY);
      const weaponSpread = weapon.spread || 0;
      const upgradeSpread = p.stakesLevel >= 3 ? 0.07 : 0;
      const spread = weaponSpread + upgradeSpread;
      const knifeCount = clamp(weapon.projectiles + Math.floor(p.shotgunProjectiles || 0), 2, 5);
      const weaponCount = weapon.id === 'knife' ? knifeCount : weapon.projectiles;
      const count = Math.max(1, weaponCount + (p.stakesLevel >= 5 ? 1 : 0));
      const fireWeapon = (w, aimOffset = 0) => {
        for(let i=0;i<count;i++){
          const t = count === 1 ? 0 : (i / (count - 1)) * 2 - 1;
          const a = Math.atan2(aim.y, aim.x) + t * spread + aimOffset;
          const critChance = (p.critChance || 0) + (w.id === 'sniper' ? (p.sniperCrit || 0) : 0);
          const crit = Math.random() < critChance;
          const gunBonus = (w.id === 'rifle' ? (p.rifleDamage || 0) : 0) + (w.id === 'knife' ? (p.shotgunDamage || 0) : 0) + (w.id === 'laser' ? (p.laserDamage || 0) : 0);
          const dmgBase = (2 + p.damage + p.stakesLevel * 0.45 + gunBonus) * w.damageMult;
          state.bullets.push({
            x:p.x, y:p.y,
            vx:Math.cos(a)*(w.speed + p.stakesLevel * 0.4), vy:Math.sin(a)*(w.speed + p.stakesLevel * 0.4),
            dmg:crit ? dmgBase * (p.critMult || 1.6) : dmgBase,
            life:w.life,
            pierce: w.id === 'dagger' ? 3 : (w.pierce + Math.floor(p.stakesLevel/2) + Math.floor(p.extraPierce || 0)),
            ricochet: w.id === 'dagger' ? 3 : (w.ricochet ? 1 : (p.stakesLevel >= 4 ? 1 : 0)),
            char: w.glyph,
            size: w.id === 'machineGun' ? (1 + (p.machineGunBulletSize || 0)) : 1
            ,spin: !!w.spin,
            wallDamageMult: w.wallDamageMult || 1
          });
        }
      };
      fireWeapon(weapon);
      if(state.effects.dualWieldUntil > state.timeSec){
        const alt = WEAPON_DROPS.find(w => w.id !== weapon.id) || weapon;
        const oscillate = Math.sin(state.timeSec * 10) * 0.28;
        fireWeapon(alt, oscillate);
      }
    }

    function whipTick(dt){
      const p = state.player;
      if(p.whipLevel <= 0) return;
      if(Math.random() > dt * (0.7 + p.whipLevel*0.2)) return;
      const arc = Math.PI * (0.35 + p.whipLevel * 0.04);
      const forward = Math.atan2(p.aimY,p.aimX);
      for(const e of state.enemies){
        const d = dist(p,e); if(d > 3.8 + p.whipLevel*0.25) continue;
        const a = Math.atan2(e.y-p.y,e.x-p.x);
        let diff = Math.abs(a-forward); if(diff > Math.PI) diff = 2*Math.PI - diff;
        if(diff <= arc/2){
          e.hp -= 3 + p.damage + p.whipLevel;
          const n = normalize(e.x-p.x,e.y-p.y);
          e.x += n.x*(0.5 + p.whipLevel*0.08);
          e.y += n.y*(0.5 + p.whipLevel*0.08);
          e.hitFlash = 0.15;
        }
      }
    }

    function garlicTick(dt){
      const p = state.player;
      if(p.garlicLevel <= 0) return;
      const r = 1.2 + p.garlicLevel * 0.45;
      for(const e of state.enemies){
        if(dist(p,e) <= r){ e.hp -= dt * (2 + p.garlicLevel + p.damage*0.4); e.hitFlash = 0.05; }
      }
    }

    function batsTick(dt){
      if(state.player.batsLevel <= 0) return;
      const p = state.player;
      const count = 2 + p.batsLevel * 2;
      for(let i=0;i<count;i++){
        const a = state.timeSec*2.2 + (Math.PI*2/count)*i;
        const flutter = Math.sin(state.timeSec * 8 + i) * 0.22;
        const r = 1.8 + p.batsLevel*0.3 + flutter;
        const bx = p.x + Math.cos(a)*r, by = p.y + Math.sin(a*1.1)*r + flutter * 0.6;
        for(const e of state.enemies){
          if(Math.hypot(e.x-bx,e.y-by) < 0.8){
            e.hp -= dt*(7 + p.batsLevel + p.damage*0.4);
            e.hitFlash = 0.05;
          }
        }
      }
    }

    function cloneLogic(dt){
      for(let i=state.clones.length-1;i>=0;i--){
        const c = state.clones[i];
        c.ttl -= dt;
        if(c.ttl <= 0){ state.clones.splice(i,1); continue; }
        let target = null;
        for(const e of state.enemies){
          if(dist(c, e) <= c.range && (!target || dist(c, e) < dist(c, target))) target = e;
        }
        if(target){
          c.fireRate = (c.fireRate || 0) - dt;
          if(c.fireRate <= 0){
            c.fireRate = Math.max(0.08, 0.34 - c.dps * 0.005);
            const n = normalize(target.x - c.x, target.y - c.y);
            state.bullets.push({ x:c.x, y:c.y, vx:n.x * c.projectileSpeed, vy:n.y * c.projectileSpeed, dmg: c.dps * 0.55, life: 0.95, pierce: 1, ricochet: 0, char: '·' });
            state.fx.push({ x: c.x, y: c.y, vx: n.x * 3, vy: n.y * 3, life: 0.16, char: '✦', color: '#c9d4ff' });
          }
        }
      }
    }

    function downgradeEnemy(e){
      const map = { juggernaut: 'ghost', ghost: 'zombie', zombie: 'bat' };
      const next = map[e.type];
      if(!next) return;
      const t = getEnemyType(next);
      if(!t) return;
      const hpRatio = clamp(e.hp / Math.max(1, getEnemyType(e.type)?.hp || e.hp), 0.2, 1);
      e.type = t.id;
      e.char = t.char;
      e.color = t.color;
      e.hp = Math.max(1, t.hp * hpRatio);
      e.speed = t.speed * 1.2;
      e.touchDamage = t.touchDamage;
      e.xp = t.xp;
      e.size = t.size || 1;
      e.boss = !!t.boss;
      e.wallDamage = t.wallDamage || 0.6;
      e.passWalls = !!t.passWalls;
      e.hitFlash = 0.3;
    }

    function abilityEffectsLogic(dt){
      const p = state.player;
      if(state.effects.spinUntil > state.timeSec){
        const dps = 11 + (state.upgradeLevels.bladeWhirl || 0) * 4;
        for(const e of state.enemies){
          if(dist(p, e) < 1.8){ e.hp -= dps * dt; e.hitFlash = 0.08; }
        }
      }
      if(state.effects.rampageUntil > state.timeSec){
        const dps = 18 + (state.upgradeLevels.dashRampage || 0) * 5;
        for(const e of state.enemies){
          if(dist(p, e) < 1.2){ e.hp -= dps * dt; e.hitFlash = 0.1; }
        }
      }
      for(let i=state.traps.length-1;i>=0;i--){
        const t = state.traps[i];
        t.ttl -= dt;
        if(t.ttl <= 0){ state.traps.splice(i,1); continue; }
        for(const e of state.enemies){
          if(dist(t, e) < t.radius){
            e.slowMul = Math.min(e.slowMul || 1, t.slow);
            e.slowTimer = Math.max(e.slowTimer || 0, 0.2);
            e.hp -= t.dps * dt;
            e.hitFlash = 0.05;
          }
        }
      }
      for(let i=state.activeLances.length-1;i>=0;i--){
        const l = state.activeLances[i];
        l.ttl -= dt;
        if(l.ttl <= 0){ state.activeLances.splice(i,1); continue; }
        for(const e of state.enemies){
          const d = Math.hypot(e.x - l.x, e.y - l.y);
          if(d < 0.9){ e.hp -= l.dps * dt; e.hitFlash = 0.1; }
        }
      }
    }

    function circleBlocked(x, y, radius = 0.3){
      const checks = [
        [x, y],
        [x + radius, y], [x - radius, y],
        [x, y + radius], [x, y - radius],
        [x + radius * 0.7, y + radius * 0.7],
        [x + radius * 0.7, y - radius * 0.7],
        [x - radius * 0.7, y + radius * 0.7],
        [x - radius * 0.7, y - radius * 0.7]
      ];
      return checks.some(([cx, cy]) => cellBlocked(Math.floor(cx), Math.floor(cy)));
    }

    function clampInsideBounds(v, radius, max){
      if(state.room === 'run') return clamp(v, 1 + radius, max - 1 - radius - 0.001);
      return clamp(v, 1 + radius, max - 1 - radius - 0.001);
    }

    function currentDifficultyLevel(){
      return Math.max(1, state.selectedLevelIndex + 1 + runIntensityTier());
    }

    function directionGlyph(x, y){
      const a = Math.atan2(y, x);
      if(a >= -Math.PI / 8 && a < Math.PI / 8) return '➤';
      if(a >= Math.PI / 8 && a < (3 * Math.PI) / 8) return '↘';
      if(a >= (3 * Math.PI) / 8 && a < (5 * Math.PI) / 8) return '▼';
      if(a >= (5 * Math.PI) / 8 && a < (7 * Math.PI) / 8) return '↙';
      if(a >= (7 * Math.PI) / 8 || a < -(7 * Math.PI) / 8) return '◀';
      if(a >= -(7 * Math.PI) / 8 && a < -(5 * Math.PI) / 8) return '↖';
      if(a >= -(5 * Math.PI) / 8 && a < -(3 * Math.PI) / 8) return '▲';
      return '↗';
    }

    function applyPlayerDamage(amount){
      const p = state.player;
      const reduced = Math.max(0, amount * (1 - (p.armor || 0)));
      let dmg = reduced;
      if((p.shield || 0) > 0){
        const used = Math.min(p.shield, dmg);
        p.shield -= used;
        dmg -= used;
      }
      if(dmg > 0){ p.hp -= dmg; state.hurtFlash = Math.min(0.35, state.hurtFlash + 0.22); spawnParticles('damage', p.x, p.y, 3); }
    }

    function enemyLogic(dt){
      const p = state.player;
      for(const e of state.enemies){
        const n = normalize(p.x - e.x, p.y - e.y);
        let moveX = n.x;
        let moveY = n.y;
        e.slowTimer = Math.max(0, (e.slowTimer || 0) - dt);
        const localSlow = e.slowTimer > 0 ? (e.slowMul || 1) : 1;
        const bubbleSlow = state.effects.timeBubbleUntil > state.timeSec ? 0.45 : 1;
        let speed = e.speed * localSlow * bubbleSlow * dt;

        if(e.type === 'juggernaut'){
          e.dashCooldown = Math.max(0, e.dashCooldown - dt);
          e.dashing = Math.max(0, e.dashing - dt);
          if(e.dashing > 0){
            moveX = e.dashDirX;
            moveY = e.dashDirY;
            speed = e.speed * 8.6 * dt;
          } else if(e.dashWindup > 0){
            e.dashWindup -= dt;
            moveX = 0;
            moveY = 0;
            speed = 0;
            if(e.dashWindup <= 0){
              e.dashing = 0.5;
              e.dashCooldown = 2.2;
            }
          } else if(e.dashCooldown <= 0){
            const dir = normalize((p.x + rand(-1, 1)) - e.x, (p.y + rand(-1, 1)) - e.y);
            e.dashDirX = dir.x;
            e.dashDirY = dir.y;
            e.dashWindup = 0.75;
          }
        }

        
        if(e.ranged){
          e.cast = Math.max(0, (e.cast || 0) - dt);
          if(e.cast <= 0 && dist(e,p) < (e.range || 11)){
            e.cast = e.castCooldown || 2.8;
            const n2 = normalize(p.x - e.x, p.y - e.y);
            state.bullets.push({ x:e.x, y:e.y, vx:n2.x * (e.shotSpeed || 4.2), vy:n2.y * (e.shotSpeed || 4.2), dmg: 4 + e.touchDamage * 0.35, life: 2.2, pierce:0, ricochet:0, char:e.shotChar || '🔥', enemyShot:true });
          }
        }
        if(e.type === 'vampire'){
          e.spawnBatAt = Math.max(0, (e.spawnBatAt || 0) - dt);
          if(e.spawnBatAt <= 0){
            e.spawnBatAt = 2.6;
            spawnEnemy('bat', { x: e.x, y: e.y }, { minPlayerDistance: 0.5 });
          }
          if(Math.random() < dt * 8) state.fx.push({ x:e.x + rand(-0.8,0.8), y:e.y + rand(-0.8,0.8), vx:rand(-0.4,0.4), vy:rand(-0.4,0.4), life:0.22, char:'🦇', color:'#baa4ff' });
        }
        if(e.type === 'zombie'){
          crushWallsAround(e, 0.42 * (e.size || 1), dt, 1.8);
        }
        if(e.type === 'wizard'){
          e.forceCooldown = Math.max(0, (e.forceCooldown || 0) - dt);
          if(e.forceCooldown <= 0){
            e.forceCooldown = 5;
            state.forceFields.push({ x: e.x, y: e.y, radius: 2.75, ttl: 10, dps: 7.5, hp: 26, maxHp: 26 });
          }
        }
const radius = 0.3 * (e.size || 1);
        const dashBreaking = e.type === 'juggernaut' && e.dashing > 0;
        const beforeX = e.x;
        const beforeY = e.y;
        if(e.passWalls){
          e.x = clampInsideBounds(e.x + moveX * speed, radius, GRID_W);
          e.y = clampInsideBounds(e.y + moveY * speed, radius, GRID_H);
        } else {
          moveWithWallCollision(e, moveX * speed, moveY * speed, radius, {
            canBreakWalls: e.canBreakWalls,
            dt,
            breakMult: dashBreaking ? 3.4 : 1
          });
        }
        const moved = Math.hypot(e.x - beforeX, e.y - beforeY);
        if(e.type === 'juggernaut' && moved < 0.02){
          breakWallTowardEntity(e, p.x, p.y, dt * 1.25);
          crushWallsAround(e, radius + 0.42, dt, dashBreaking ? 2.5 : 1.6);
          if(e.x <= 1.35 || e.x >= GRID_W - 1.35) e.dashDirX *= -1;
          if(e.y <= 1.35 || e.y >= GRID_H - 1.35) e.dashDirY *= -1;
          e.x = clampInsideBounds(e.x + rand(-0.08,0.08), radius, GRID_W);
          e.y = clampInsideBounds(e.y + rand(-0.08,0.08), radius, GRID_H);
        } else if(e.type === 'juggernaut' && e.dashing > 0){
          crushWallsAround(e, radius + 0.28, dt, 1.5);
        }

        if(dist(e,p) < 0.65 + (e.size - 1) * 0.45){ applyPlayerDamage(e.touchDamage*dt); }
        e.hitFlash = Math.max(0, e.hitFlash - dt);
      }
      resolveEnemyCrowding(dt);
      for(let i=state.enemies.length-1;i>=0;i--){
        const e = state.enemies[i];
        if(e.hp <= 0){
          spawnParticles('blood', e.x, e.y, e.boss ? 14 : 7);
          spawnParticles('blast', e.x, e.y, e.boss ? 10 : 6);
          state.kills++;
          if(state.kills % KILLS_PER_INTENSITY_LEVEL === 0){
            state.deathNote = `Intensity up! Enemy tier ${currentDifficultyLevel()}`;
          }
          state.gems.push({x:e.x,y:e.y,v:Math.max(1, Math.round(e.xp * 2))});
          if(e.boss || Math.random() < 0.14){
            const drop = randomWeaponDrop();
            state.pickups.push({ x: e.x, y: e.y, kind: 'weapon', weaponId: drop.id, bornAt: state.timeSec, ttl: rand(3, 5), blinkAt: 1.6, crate:true });
          }
          if(Math.random() < 0.08){
            state.pickups.push({ x: e.x, y: e.y, kind: 'health', heal: 6, bornAt: state.timeSec, ttl: rand(4.5, 7), blinkAt: 3.4 });
          }
          if(Math.random() < 0.12){
            state.pickups.push({ x: e.x, y: e.y, kind: 'chem', bornAt: state.timeSec, ttl: rand(4.5, 7.5), blinkAt: 3.4 });
          }
          state.enemies.splice(i,1);
        }
      }
    }



    function resolveEnemyCrowding(dt){
      for(let i=0;i<state.enemies.length;i++){
        const a = state.enemies[i];
        let centerX = 0;
        let centerY = 0;
        let neighbors = 0;
        for(let j=i+1;j<state.enemies.length;j++){
          const b = state.enemies[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const distNow = Math.hypot(dx, dy) || 0.0001;
          const minDist = 0.44 * ((a.size || 1) + (b.size || 1));
          if(distNow < 2.2){
            centerX += b.x;
            centerY += b.y;
            neighbors++;
          }
          if(distNow >= minDist) continue;
          const push = (minDist - distNow) * 0.5;
          const nx = dx / distNow;
          const ny = dy / distNow;
          const lockA = a.type === 'juggernaut' && a.dashWindup > 0;
          const lockB = b.type === 'juggernaut' && b.dashWindup > 0;
          if(!lockA){
            a.x = clampInsideBounds(a.x - nx * push, 0.3 * (a.size || 1), GRID_W);
            a.y = clampInsideBounds(a.y - ny * push, 0.3 * (a.size || 1), GRID_H);
          }
          if(!lockB){
            b.x = clampInsideBounds(b.x + nx * push, 0.3 * (b.size || 1), GRID_W);
            b.y = clampInsideBounds(b.y + ny * push, 0.3 * (b.size || 1), GRID_H);
          }
        }
        if(neighbors > 2 && !(a.type === 'juggernaut' && a.dashWindup > 0)){
          const tx = centerX / neighbors;
          const ty = centerY / neighbors;
          a.x = clampInsideBounds(a.x + (tx - a.x) * dt * 0.5, 0.3 * (a.size || 1), GRID_W);
          a.y = clampInsideBounds(a.y + (ty - a.y) * dt * 0.5, 0.3 * (a.size || 1), GRID_H);
        }
      }
    }
    function damageWallAt(x, y, dmg){
      const gx = clamp(Math.floor(x), 0, GRID_W - 1);
      const gy = clamp(Math.floor(y), 0, GRID_H - 1);
      const hp = state.walls[gy]?.[gx] || 0;
      if(hp <= 0 || hp >= 900) return false;
      const nextHp = Math.max(0, hp - dmg);
      state.walls[gy][gx] = nextHp;
      if(nextHp <= 0) spawnParticles('blast', gx + 0.5, gy + 0.5, 8);
      return true;
    }

    function bulletLogic(dt){
      for(let i=state.bullets.length-1;i>=0;i--){
        const b = state.bullets[i];
        b.x += b.vx*dt; b.y += b.vy*dt; b.life -= dt;
        const hitWall = b.enemyShot ? false : damageWallAt(b.x, b.y, Math.max(1, b.dmg * (0.9 + (state.player.wallDamageBoost || 0)) * (b.wallDamageMult || 1)));
        if(b.x<0||b.x>=GRID_W||b.y<0||b.y>=GRID_H||hitWall){
          if(b.ricochet>0){ b.ricochet--; b.vx*=-1; b.vy*=-1; }
          else { state.bullets.splice(i,1); continue; }
        }
        if(b.enemyShot && dist(b, state.player) < 0.55){ applyPlayerDamage(b.dmg * dt * 8); state.bullets.splice(i,1); continue; }
        let used = false;
        for(const e of state.enemies){
          if(Math.hypot(e.x-b.x,e.y-b.y) < 0.55){
            const bonus = e.type === 'juggernaut' ? (state.player.juggernautDamage || 0) : 0;
            e.hp -= b.dmg * (1 + bonus); e.hitFlash=0.07; spawnParticles('spark', b.x, b.y, 3);
            if(state.player.lifeSteal){ state.player.hp = clamp(state.player.hp + b.dmg * state.player.lifeSteal, 0, state.player.maxHp); }
            if(b.pierce > 0){ b.pierce--; } else { used = true; break; }
          }
        }
        if(!used){
          for(let fi=state.forceFields.length-1;fi>=0;fi--){
            const f = state.forceFields[fi];
            if(Math.hypot(f.x - b.x, f.y - b.y) >= 0.7) continue;
            f.hp -= b.dmg;
            spawnParticles('spark', b.x, b.y, 4);
            if(f.hp <= 0){
              spawnParticles('blast', f.x, f.y, 10);
              state.forceFields.splice(fi, 1);
            }
            used = true;
            break;
          }
        }
        if(used || b.life <= 0) state.bullets.splice(i,1);
      }
    }

    function forceFieldLogic(dt){
      const p = state.player;
      for(let i=state.forceFields.length-1;i>=0;i--){
        const f = state.forceFields[i];
        f.ttl -= dt;
        if(f.ttl <= 0){
          state.forceFields.splice(i, 1);
          continue;
        }
        if(Math.hypot(p.x - f.x, p.y - f.y) <= f.radius){
          applyPlayerDamage(f.dps * dt);
        }
      }
    }

    function pickupGems(dt){
      const p = state.player;
      for(let i=state.gems.length-1;i>=0;i--){
        const g = state.gems[i], d = dist(p,g);
        if(d < p.pickupRadius){
          state.money += g.v;
          state.gems.splice(i,1);
        } else if(d < p.pickupRadius + 2.5){
          const n = normalize(p.x-g.x,p.y-g.y);
          g.x += n.x*0.06; g.y += n.y*0.06; g.magnetized = true;
        }
      }
      for(let i=state.pickups.length-1;i>=0;i--){
        const pickup = state.pickups[i];
        const age = state.timeSec - (pickup.bornAt || 0);
        if(age > (pickup.ttl || 4)){
          state.pickups.splice(i, 1);
          continue;
        }
        const pickupRange = (pickup.kind || 'weapon') === 'weapon' ? 0.9 : Math.max(0.75, p.pickupRadius * 0.48);
        const touchingPickup = dist(p, pickup) < pickupRange;
        pickup.touching = touchingPickup;
        if(touchingPickup && pickup.kind === 'health'){
          state.player.hp = clamp(state.player.hp + (pickup.heal || 4), 0, state.player.maxHp);
          spawnParticles('heal', pickup.x, pickup.y, 14);
          state.pickups.splice(i, 1);
          continue;
        }
        if(touchingPickup && pickup.kind === 'chem'){
          state.effects.sprintUntil = Math.max(state.effects.sprintUntil, state.timeSec + 7);
          spawnParticles('heal', pickup.x, pickup.y, 8);
          state.pickups.splice(i, 1);
          continue;
        }
      }
    }

    function upgradeCost(up){
      const level = state.upgradeLevels[up.id] || 0;
      return 15 + level * 18;
    }

    function upgradeBucket(up){
      if(up.exclusiveGroup) return up.exclusiveGroup;
      return up.id;
    }

    function pickShopUpgrades(available, count = 4){
      const shuffled = [...available].sort(()=>Math.random()-0.5);
      const picks = [];
      const used = new Set();
      for(const up of shuffled){
        const bucket = upgradeBucket(up);
        if(used.has(bucket)) continue;
        used.add(bucket);
        picks.push(up);
        if(picks.length >= count) break;
      }
      return picks;
    }

    function rerollShopOffer(index){
      const available = state.configs.upgrades.filter(canTakeUpgrade);
      if(!available.length){
        state.shopOffers[index] = null;
        return;
      }
      const pick = available[Math.floor(Math.random() * available.length)];
      state.shopOffers[index] = pick.id;
    }

    function openCrateShop(){
      if(state.room !== 'safehouse') return;
      state.shopOpen = !state.shopOpen;
      if(!state.shopOpen) return;
      if(!state.shopOffers.length) state.shopOffers = [null, null, null];
      for(let i=0;i<3;i++) if(!state.shopOffers[i]) rerollShopOffer(i);
      renderShopChoices();
    }

    function renderShopChoices(){
      if(!state.shopOpen) return;
      shopChoices.innerHTML = '';
      for(let i=0;i<3;i++){
        const offerId = state.shopOffers[i];
        const up = state.configs.upgrades.find(item => item.id === offerId);
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'choice';
        if(!up){
          btn.disabled = true;
          btn.textContent = 'No upgrade available';
          shopChoices.appendChild(btn);
          continue;
        }
        const cost = upgradeCost(up);
        const level = state.upgradeLevels[up.id] || 0;
        btn.textContent = `${up.name} Lv ${level + 1} · $${cost}`;
        btn.title = upgradeSummary(up);
        btn.disabled = state.money < cost || !canTakeUpgrade(up);
        btn.addEventListener('click', ()=>{
          if(state.money < cost || !canTakeUpgrade(up)) return;
          state.money -= cost;
          applyUpgrade(up);
          rerollShopOffer(i);
          renderShopChoices();
        });
        shopChoices.appendChild(btn);
      }
    }


    function triggerFixture(fixture){
      if(!state.fixtures[fixture.id]){
        if(state.money < fixture.cost) return;
        state.money -= fixture.cost;
        state.fixtures[fixture.id] = true;
        rebuildFromUpgrades();
        savePersistentState();
        return;
      }
      if(fixture.id === 'gunRack'){
        const idx = WEAPON_DROPS.findIndex(w => w.id === state.selectedStartWeapon);
        const next = WEAPON_DROPS[(idx + 1) % WEAPON_DROPS.length];
        state.selectedStartWeapon = next.id;
        savePersistentState();
      }
      if(fixture.id === 'vault'){
        if(state.money > 0){
          state.bankMoney += state.money;
          state.money = 0;
        } else if(state.bankMoney > 0){
          state.money = state.bankMoney;
          state.bankMoney = 0;
        }
        savePersistentState();
      }
      if(fixture.id === 'wardrobe'){
        const idx = PLAYER_EMOJIS.indexOf(EMOJIS.player);
        const nextIndex = (idx + 1 + PLAYER_EMOJIS.length) % PLAYER_EMOJIS.length;
        EMOJIS.player = PLAYER_EMOJIS[nextIndex];
        savePersistentState();
      }
    }

    function currentInteractable(){
      const p = state.player;
      const door = doorInfo();
      const doorTouching = Math.hypot(p.x - (door.x + 0.5), p.y - (door.y + 0.5)) < 1.1;
      if(doorTouching){
        return { prompt: `Press SPACE to enter ${door.target === 'run' ? 'door' : 'portal'}`, action: () => {
          if(state.room === 'run'){
            state.highestUnlockedLevel = Math.max(state.highestUnlockedLevel, state.selectedLevelIndex + 1);
            savePersistentState();
            setupSafehouse();
          } else {
            startRun();
          }
        }};
      }
      for(const pickup of state.pickups){
        if((pickup.kind || 'weapon') !== 'weapon') continue;
        if(!pickup.touching) continue;
        const weapon = getWeaponDrop(pickup.weaponId);
        return { prompt: `Press SPACE to open 🎁 (${weapon.glyph} ${weapon.name})`, action: () => {
          const roll = randomWeaponDrop();
          state.activeWeapon = roll.id;
          spawnParticles('spark', pickup.x, pickup.y, 12);
          state.pickups = state.pickups.filter(item => item !== pickup);
        }};
      }
      if(state.room === 'safehouse'){
        for(const fixture of SAFEHOUSE_FIXTURES){
          const touching = Math.hypot(p.x - fixture.x, p.y - fixture.y) < 1.2;
          if(!touching) continue;
          if(!state.fixtures[fixture.id]){
            return { prompt: `Press SPACE to buy ${fixture.name} ($${fixture.cost}) — ${fixture.desc}`, action: () => triggerFixture(fixture) };
          }
          if(fixture.id === 'gunRack') return { prompt: `Press SPACE to switch start weapon (${getWeaponDrop(state.selectedStartWeapon).name})`, action: () => triggerFixture(fixture) };
          if(fixture.id === 'vault') return { prompt: 'Press SPACE to bank/withdraw money', action: () => triggerFixture(fixture) };
          if(fixture.id === 'wardrobe') return { prompt: `Press SPACE to change emoji (${EMOJIS.player})`, action: () => triggerFixture(fixture) };
        }
      }
      return null;
    }

    function handleInteractPress(){
      const interact = currentInteractable();
      if(interact) interact.action();
    }

    function updateSafehouseFixturePads(_dt){
      const interact = currentInteractable();
      let prompt = interact ? interact.prompt : '';
      if(state.room === 'safehouse' && state.hoveredFixtureId){
        const fixture = SAFEHOUSE_FIXTURES.find(f => f.id === state.hoveredFixtureId);
        if(fixture) prompt = `${fixture.name} ($${fixture.cost}): ${fixture.desc}`;
      }
      state.interactPrompt = prompt;
    }

    function canTakeUpgrade(up){
      const p = state.player;
      const level = state.upgradeLevels[up.id] || 0;
      if(level >= (up.maxLevel || 99)) return false;
      if(up.id in ABILITY_META){
        const slot = state.abilitySlots.find(s => s.id === up.id);
        return !!slot;
      }
      if(up.id === 'extraAbilityUse') return state.abilitySlots.some(s => s.level > 0 && s.maxCharges < 6);
      const map = { whip: 'whipLevel', garlic: 'garlicLevel', stakes: 'stakesLevel', bats: 'batsLevel' };
      const k = map[up.id];
      if(k) return true;
      return true;
    }

    function applyUpgrade(up){
      const p = state.player;
      state.upgradeLevels[up.id] = (state.upgradeLevels[up.id] || 0) + 1;
      if(up.id in ABILITY_META){
        const slot = state.abilitySlots.find(s => s.id === up.id);
        if(slot){
          slot.level++;
          slot.maxCharges = Math.max(slot.maxCharges, ABILITY_META[up.id].baseCharges + Math.floor(slot.level / 2));
          slot.charges = clamp(slot.charges + 1, 0, slot.maxCharges);
          slot.cooldownMs = Math.max(2400, ABILITY_META[up.id].baseCooldown - slot.level * 700);
        }
      }
      if(up.id === 'extraAbilityUse'){
        for(const slot of state.abilitySlots){
          if(slot.level > 0){
            slot.maxCharges = Math.min(6, slot.maxCharges + 1);
            slot.charges = slot.maxCharges;
          }
        }
      }
      if(up.id === 'phaseStride'){
        state.phaseWalkUntil = Math.max(state.phaseWalkUntil, state.timeSec + 10);
      }
      if(up.id === 'whip') p.whipLevel++;
      if(up.id === 'garlic') p.garlicLevel++;
      if(up.id === 'stakes') p.stakesLevel++;
      if(up.id === 'bats') p.batsLevel++;
      const fx = up.effectsPerLevel || {};
      if(fx.damage) p.damage += fx.damage;
      if(fx.cooldownMs) p.cooldownMs += fx.cooldownMs;
      if(fx.moveSpeed) p.moveSpeed += fx.moveSpeed;
      if(fx.pickupRadius) p.pickupRadius += fx.pickupRadius;
      if(fx.maxHp){ p.maxHp += fx.maxHp; p.hp += (fx.heal || 0); }
      if(fx.maxShield){ p.maxShield += fx.maxShield; p.shield += fx.maxShield; }
      if(fx.lifeSteal) p.lifeSteal = (p.lifeSteal || 0) + fx.lifeSteal;
      if(fx.critChance) p.critChance = (p.critChance || 0) + fx.critChance;
      if(fx.critMult) p.critMult = (p.critMult || 1.5) + fx.critMult;
      if(fx.armor) p.armor = (p.armor || 0) + fx.armor;
      if(fx.rifleDamage) p.rifleDamage = (p.rifleDamage || 0) + fx.rifleDamage;
      if(fx.shotgunDamage) p.shotgunDamage = (p.shotgunDamage || 0) + fx.shotgunDamage;
      if(fx.laserDamage) p.laserDamage = (p.laserDamage || 0) + fx.laserDamage;
      if(fx.smgRate) p.smgRate = (p.smgRate || 0) + fx.smgRate;
      if(fx.sniperCrit) p.sniperCrit = (p.sniperCrit || 0) + fx.sniperCrit;
      if(fx.batCount) p.batsLevel += fx.batCount;
      if(fx.pierce) p.extraPierce = (p.extraPierce || 0) + fx.pierce;
      if(fx.shotgunProjectiles) p.shotgunProjectiles = (p.shotgunProjectiles || 0) + fx.shotgunProjectiles;
      if(fx.machineGunBulletSize) p.machineGunBulletSize = (p.machineGunBulletSize || 0) + fx.machineGunBulletSize;
      if(fx.juggernautDamage) p.juggernautDamage = (p.juggernautDamage || 0) + fx.juggernautDamage;
      if(fx.wallDamageBoost) p.wallDamageBoost = (p.wallDamageBoost || 0) + fx.wallDamageBoost;
      p.hp = clamp(p.hp,0,p.maxHp);
      p.shield = clamp(p.shield || 0,0,p.maxShield || 0);
    }

    function rebuildFromUpgrades(){
      const hpRatio = state.player.maxHp > 0 ? state.player.hp / state.player.maxHp : 1;
      Object.assign(state.player, {
        maxHp: BASE_PLAYER.maxHp,
        hp: BASE_PLAYER.hp,
        shield: 0,
        maxShield: state.fixtures.armorStand ? 16 : 0,
        lifeSteal: 0,
        critChance: 0,
        critMult: 1.6,
        armor: 0,
        moveSpeed: BASE_PLAYER.moveSpeed,
        damage: BASE_PLAYER.damage,
        pickupRadius: BASE_PLAYER.pickupRadius,
        cooldownMs: BASE_PLAYER.cooldownMs,
        whipLevel: BASE_PLAYER.whipLevel,
        garlicLevel: BASE_PLAYER.garlicLevel,
        stakesLevel: BASE_PLAYER.stakesLevel,
        batsLevel: BASE_PLAYER.batsLevel
      });
      initAbilitySlots();
      for(const [id, lv] of Object.entries(state.upgradeLevels)){
        const up = state.configs.upgrades.find(u => u.id === id);
        if(!up) continue;
        for(let i=0;i<lv;i++) applyUpgrade(up);
        state.upgradeLevels[id] = lv;
      }
      state.player.hp = clamp(state.player.maxHp * hpRatio, 1, state.player.maxHp);
      state.player.shield = state.player.maxShield;
    }

    function applyDeathPenalty(){
      const beforeMoney = state.money;
      state.money = Math.floor(state.money * 0.5);
      const lostMoney = beforeMoney - state.money;
      const pool = Object.entries(state.upgradeLevels).filter(([, lv]) => lv > 0);
      let lostUpgrade = '';
      if(pool.length){
        const [id] = pool[Math.floor(Math.random() * pool.length)];
        const up = state.configs.upgrades.find(u => u.id === id);
        lostUpgrade = up?.name || id;
        state.upgradeLevels[id] = 0;
        rebuildFromUpgrades();
      }
      state.deathNote = lostUpgrade
        ? `You died. Lost $${lostMoney} and ${lostUpgrade}.`
        : `You died. Lost $${lostMoney}.`;
    }

    function activateAbilitySlot(_index){
      return;
    }

    function useAbility(_slot){ return false; }


    function upgradeSummary(up){
      const parts = [up.description];
      const fx = up.effectsPerLevel || {};
      if(fx.damage) parts.push(`DMG +${fx.damage}`);
      if(fx.cooldownMs) parts.push(`Fire rate ${fx.cooldownMs < 0 ? '+' : '-'}${Math.abs(fx.cooldownMs)}ms`);
      if(fx.moveSpeed) parts.push(`Move +${fx.moveSpeed.toFixed(2)}`);
      if(fx.pickupRadius) parts.push(`Pickup +${fx.pickupRadius.toFixed(2)}`);
      if(fx.maxHp) parts.push(`Max HP +${fx.maxHp}`);
      if(fx.heal) parts.push(`Heal +${fx.heal}`);
      return parts.join(' · ');
    }


    function roomDoor(){
      if(state.room === 'run'){
        if(!state.world.doors.run) state.world.doors.run = randomRunDoor();
        return state.world.doors.run;
      }
      return { x: Math.floor(GRID_W / 2), y: 1 };
    }

    function doorInfo(){
      if(state.room === 'run'){
        const door = roomDoor();
        return { x: door.x, y: door.y, target: 'safehouse' };
      }
      return { x: Math.floor(GRID_W / 2), y: 1, target: 'run' };
    }

    function updateDoorState(_dt){
      state.doorTouchSec = 0;
    }

    function spawnLogic(){
      if(state.room !== 'run') return;
      const now = performance.now();
      const w = currentWave();
      if(now >= state.nextSpawnAt){
        const roll = Math.random() < 0.025;
        const swarmWeight = Math.min(220, 30 + state.timeSec * 1.6 + state.kills * 0.28);
        const mix = w.mix.map(m => m.type === 'bat' ? { ...m, weight: m.weight + swarmWeight } : m);
        const spawnType = roll ? 'juggernaut' : pickWeighted(mix);
        const loneHeavy = spawnType === 'juggernaut';
        const group = loneHeavy ? 1 : (1 + Math.floor(Math.random() * (Math.random() < 0.3 ? 3 : 2)));
        const spawnOpts = loneHeavy ? { minPlayerDistance: 9.5 } : {};
        let anchor = null;
        for(let i=0;i<group;i++){
          if(i === 0){
            const before = state.enemies.length;
            spawnEnemy(spawnType, null, spawnOpts);
            const first = state.enemies[state.enemies.length - 1];
            anchor = state.enemies.length > before ? { x: first.x, y: first.y } : null;
          } else {
            spawnEnemy(spawnType, anchor, spawnOpts);
          }
        }
