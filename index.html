        const earlyBoost = state.timeSec < 35 ? 0.76 : (state.timeSec < 70 ? 0.9 : 1.05);
        const killRamp = Math.max(0.28, 1 - Math.min(0.7, state.kills * 0.0032));
        state.nextSpawnAt = now + w.spawnEveryMs * earlyBoost * killRamp * levelProgression().spawn;
      }
      if(state.timeSec >= state.nextBossAt){
        spawnEnemy('juggernaut');
        state.nextBossAt += Math.max(20, state.levelDef.bossIntervalSec * (0.92 - Math.min(0.3, state.selectedLevelIndex * 0.05)));
      }
    }
    
    function tryRoomShift(){
      return;
    }
function inputLogic(dt){
      const p = state.player;
      const move = state.joysticks.move;
      if(state.usingKeyboardMove){
        const keyX = (state.keyboard.right ? 1 : 0) - (state.keyboard.left ? 1 : 0);
        const keyY = (state.keyboard.down ? 1 : 0) - (state.keyboard.up ? 1 : 0);
        move.x = keyX;
        move.y = keyY;
      }
      const m = normalize(move.x, move.y);
      const accel = 27;
      const drag = 0.83;
      const sprintBoost = state.effects.sprintUntil > state.timeSec ? 2.1 : 1;
      const rampageBoost = state.effects.rampageUntil > state.timeSec ? 1.7 : 1;
      state.movement.vx += (m.x * p.moveSpeed * sprintBoost * rampageBoost - state.movement.vx) * Math.min(1, dt * accel);
      state.movement.vy += (m.y * p.moveSpeed * sprintBoost * rampageBoost - state.movement.vy) * Math.min(1, dt * accel);
      if(Math.hypot(move.x, move.y) < 0.1){
        state.movement.vx *= drag;
        state.movement.vy *= drag;
      }
      moveWithWallCollision(p, state.movement.vx * dt, state.movement.vy * dt, 0.32);
      tryRoomShift();

      // Keep movement arena free-form: no ability should paint tile-locked walls on the run map.

      const aim = state.joysticks.aim;
      if(aim.active && Math.hypot(aim.x, aim.y) > 0.2){
        p.aimX += (aim.x - p.aimX) * Math.min(1, dt * 20); p.aimY += (aim.y - p.aimY) * Math.min(1, dt * 20);
      } else if(AUTO_AIM_ENABLED && state.enemies.length){
        const nearest = state.enemies.reduce((best,e)=> dist(p,e) < dist(p,best)?e:best, state.enemies[0]);
        p.aimX += (nearest.x - p.x - p.aimX) * Math.min(1, dt * 10); p.aimY += (nearest.y - p.y - p.aimY) * Math.min(1, dt * 10);
      }
      if(state.room === 'run') fire();

      for(const slot of state.abilitySlots){
        if(slot.level > 0 && slot.charges < slot.maxCharges && performance.now() >= slot.nextReadyAt){
          slot.charges++;
          if(slot.charges < slot.maxCharges) slot.nextReadyAt = performance.now() + slot.cooldownMs;
        }
      }
    }

    function render(){
      resizeScreenCanvas();
      const ctx = screenCtx;
      const { sx, sy, ox, oy, camX, camY } = worldScale();
      ctx.clearRect(0, 0, screen.width, screen.height);
      ctx.fillStyle = '#080b12';
      ctx.fillRect(0, 0, screen.width, screen.height);
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      for(let y=0;y<GRID_H;y++){
        for(let x=0;x<GRID_W;x++){
          const hp = state.walls[y]?.[x] || 0;
          if(hp <= 0) continue;
          const n = (Math.sin((x + state.timeSec) * 0.8) + Math.cos((y - state.timeSec) * 0.7)) * 0.5;
          const base = hp >= 900 ? [120, 24, 24] : (hp > 6 ? [95, 120, 176] : (hp > 3 ? [78, 98, 144] : [60, 77, 112]));
          const bump = Math.floor(n * 14);
          ctx.fillStyle = `rgb(${base[0] + bump}, ${base[1] + bump}, ${base[2] + bump})`;
          const cellPos = toScreen(x + 0.5, y + 0.5, sx, sy, ox, oy, camX, camY);
          ctx.fillRect(cellPos.x - sx * 0.5, cellPos.y - sy * 0.5, sx, sy);
          if((x + y) % 3 === 0){
            ctx.fillStyle = 'rgba(20,30,52,0.35)';
            ctx.fillRect(cellPos.x - sx * 0.5, cellPos.y - sy * 0.5, sx * 0.35, sy * 0.35);
          }
        }
      }

      for(const g of state.gems){
        const p = toScreen(g.x, g.y, sx, sy, ox, oy, camX, camY);
        g.spin = (g.spin || 0) + (g.magnetized ? 0.28 : 0.08);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(g.spin);
        ctx.font = `${Math.max(10, Math.min(sx, sy) * 0.44)}px ui-monospace, monospace`; ctx.fillStyle='#7dff95'; ctx.fillText(EMOJIS.gem, 0, 0);
        ctx.restore();
      }
      for(const pickup of state.pickups){
        const age = state.timeSec - (pickup.bornAt || 0);
        const blinkAt = pickup.blinkAt || 1.6;
        const blink = age > blinkAt && Math.floor(state.timeSec * 12) % 2 === 0;
        if(blink) continue;
        const p = toScreen(pickup.x, pickup.y, sx, sy, ox, oy, camX, camY);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        if((pickup.kind || 'weapon') === 'health'){
          const pulse = 1 + Math.sin(state.timeSec * 8 + pickup.x) * 0.2;
          ctx.fillStyle = '#ff8fd7';
          ctx.font = `${Math.max(12, Math.min(sx, sy) * 0.56 * pulse)}px ui-monospace, monospace`;
          ctx.fillText(EMOJIS.health, p.x, p.y);
        } else if(pickup.kind === 'chem'){
          ctx.fillStyle = '#89f6ff';
          ctx.font = `${Math.max(12, Math.min(sx, sy) * 0.54)}px ui-monospace, monospace`;
          ctx.fillText(EMOJIS.chem, p.x, p.y);
          ctx.fillStyle = '#c6f9ff';
          ctx.font = `${Math.max(7, Math.min(sx, sy) * 0.22)}px ui-monospace, monospace`;
          ctx.fillText('speed boost', p.x, p.y + sy * 0.42);
        } else {
          const weapon = getWeaponDrop(pickup.weaponId);
          ctx.fillStyle = '#b98dff';
          ctx.font = `${Math.max(12, Math.min(sx, sy) * 0.53)}px ui-monospace, monospace`;
          ctx.fillText('🎁', p.x, p.y);
          ctx.fillStyle = '#cfd4ff';
          ctx.font = `${Math.max(7, Math.min(sx, sy) * 0.2)}px ui-monospace, monospace`;
          ctx.fillText(`${weapon.glyph} ${weapon.name}`, p.x, p.y + sy * 0.28);
          ctx.fillText('open', p.x, p.y + sy * 0.48);
        }
      }

      const p = state.player;
      if(p.garlicLevel>0){
        const r = (1.2 + p.garlicLevel * 0.45) * Math.min(sx, sy);
        const cp = toScreen(p.x, p.y, sx, sy, ox, oy, camX, camY);
        ctx.strokeStyle = 'rgba(212,255,122,0.55)';
        ctx.lineWidth = Math.max(1.5, Math.min(sx, sy) * 0.08);
        ctx.beginPath();
        ctx.arc(cp.x, cp.y, r, 0, Math.PI * 2);
        ctx.stroke();
      }

      if(p.batsLevel>0){
        const count = 2 + p.batsLevel * 2;
        for(let i=0;i<count;i++){
          const a = state.timeSec*2.2 + (Math.PI*2/count)*i;
          const r = 1.8 + p.batsLevel*0.25;
          const bob = Math.sin(state.timeSec * 5.2 + i * 0.8) * 0.2;
          const bp = toScreen(p.x + Math.cos(a) * r, p.y + Math.sin(a) * r + bob, sx, sy, ox, oy, camX, camY);
          drawCircle(ctx, bp.x, bp.y, Math.max(2, Math.min(sx, sy) * 0.16), '#bda6ff');
        }
      }

      for(const b of state.bullets){
        const bp = toScreen(b.x, b.y, sx, sy, ox, oy, camX, camY);
        const glyph = b.char || EMOJIS.bullet;
        ctx.fillStyle = '#ffd166';
        ctx.font = `${Math.max(9, Math.min(sx, sy) * 0.32)}px ui-monospace, monospace`;
        if(b.spin){
          b.spinRot = (b.spinRot || 0) + 0.38;
          ctx.save();
          ctx.translate(bp.x, bp.y);
          ctx.rotate(b.spinRot);
          ctx.fillText(glyph, 0, 0);
          ctx.restore();
        } else {
          ctx.fillText(glyph, bp.x, bp.y);
        }
      }
      for(const field of state.forceFields){
        const fp = toScreen(field.x, field.y, sx, sy, ox, oy, camX, camY);
        const r = field.radius * Math.min(sx, sy);
        ctx.fillStyle = 'rgba(110, 180, 255, 0.15)';
        ctx.beginPath();
        ctx.arc(fp.x, fp.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(130, 210, 255, 0.5)';
        ctx.lineWidth = Math.max(1, Math.min(sx, sy) * 0.07);
        ctx.beginPath();
        ctx.arc(fp.x, fp.y, r, 0, Math.PI * 2);
        ctx.stroke();
        const nodeRatio = clamp((field.hp || 0) / (field.maxHp || 1), 0, 1);
        ctx.fillStyle = '#8ce4ff';
        ctx.font = `${Math.max(12, Math.min(sx, sy) * 0.52)}px ui-monospace, monospace`;
        ctx.fillText('🧿', fp.x, fp.y);
        ctx.fillStyle = '#18212f';
        ctx.fillRect(fp.x - sx * 0.45, fp.y + sy * 0.35, sx * 0.9, Math.max(3, sy * 0.08));
        ctx.fillStyle = '#6de3ff';
        ctx.fillRect(fp.x - sx * 0.45, fp.y + sy * 0.35, sx * 0.9 * nodeRatio, Math.max(3, sy * 0.08));
      }
      for(const e of state.enemies){
        const ep = toScreen(e.x, e.y, sx, sy, ox, oy, camX, camY);
        const ghostPulse = (e.type === 'ghost' || e.type === 'bat') ? (1 + Math.sin(state.timeSec * 5 + e.x * 1.4) * 0.14) : 1;
        const radius = (0.22 + (e.size - 1) * 0.12) * ghostPulse * Math.min(sx, sy);
        if(e.type === 'juggernaut' && (e.dashWindup > 0 || e.dashing > 0)){
          const prep = clamp((0.75 - Math.max(0, e.dashWindup)) / 0.75, 0, 1);
          const blinkRate = 4 + prep * 18;
          if(Math.floor(state.timeSec * blinkRate) % 2 === 0){
            const len = (1.6 + prep * 2.4) * Math.min(sx, sy);
            const dir = normalize(e.dashDirX || 1, e.dashDirY || 0);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = Math.max(1, Math.min(sx, sy) * (0.05 + prep * 0.06));
            ctx.beginPath();
            ctx.moveTo(ep.x, ep.y);
            ctx.lineTo(ep.x + dir.x * len, ep.y + dir.y * len);
            ctx.stroke();
          }
        }
        ctx.fillStyle = e.hitFlash > 0 ? '#ffffff' : (e.color || '#ff6f7d'); ctx.font = `${Math.max(10, radius * 2.3)}px ui-monospace, monospace`; ctx.fillText(EMOJIS.enemy[e.type] || '👾', ep.x, ep.y);
      }
      for(const c of state.clones){
        const cp = toScreen(c.x, c.y, sx, sy, ox, oy, camX, camY);
        ctx.fillStyle = '#c1ccff'; ctx.font = `${Math.max(11, Math.min(sx, sy) * 0.4)}px ui-monospace, monospace`; ctx.fillText(EMOJIS.clone, cp.x, cp.y);
      }
      for(const t of state.traps){
        const tp = toScreen(t.x, t.y, sx, sy, ox, oy, camX, camY);
        ctx.fillStyle = '#98f59f'; ctx.font = `${Math.max(10, Math.min(sx, sy) * 0.3)}px ui-monospace, monospace`; ctx.fillText(EMOJIS.trap, tp.x, tp.y);
      }
      for(const l of state.activeLances){
        const lp = toScreen(l.x, l.y, sx, sy, ox, oy, camX, camY);
        ctx.strokeStyle = '#8be8ff';
        ctx.lineWidth = Math.max(1, Math.min(sx, sy) * 0.08);
        ctx.beginPath();
        ctx.moveTo(lp.x, lp.y - sy * 0.3);
        ctx.lineTo(lp.x, lp.y + sy * 0.3);
        ctx.stroke();
      }
      for(const f of state.fx){
        const fp = toScreen(f.x, f.y, sx, sy, ox, oy, camX, camY);
        ctx.fillStyle = f.color;
        ctx.font = `${Math.max(9, Math.min(sx, sy) * 0.3)}px ui-monospace, monospace`;
        ctx.fillText(f.char || '·', fp.x, fp.y);
      }

      const door = doorInfo();
      const dp = toScreen(door.x + 0.5, door.y + 0.5, sx, sy, ox, oy, camX, camY);
      const doorGlyph = door.target === 'safehouse' ? '🌀' : '🚪';
      const spin = door.target === 'safehouse' ? Math.sin(state.timeSec * 5.5) * 0.35 : 0;
      const bob = door.target === 'safehouse' ? Math.sin(state.timeSec * 4.8) * sy * 0.08 : 0;
      ctx.save();
      ctx.translate(dp.x, dp.y + bob);
      ctx.rotate(spin);
      ctx.font = `${Math.max(12, Math.min(sx, sy) * 0.72)}px ui-monospace, monospace`;
      ctx.fillStyle = '#ffffff';
      ctx.fillText(doorGlyph, 0, 0);
      ctx.restore();

      if(state.room === 'safehouse'){
        for(const fixture of SAFEHOUSE_FIXTURES){
          const fp = toScreen(fixture.x, fixture.y, sx, sy, ox, oy, camX, camY);
          const purchased = state.fixtures[fixture.id];
          const progress = state.fixturePadTimers[fixture.id] || 0;
          ctx.fillStyle = purchased ? '#8cffaa' : '#a5a8b6';
          ctx.font = `${Math.max(12.5, Math.min(sx, sy) * 0.6)}px ui-monospace, monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(fixture.symbol, fp.x, fp.y - sy * 0.35);
          const line = purchased ? `${fixture.name} ✔` : `${fixture.name} $${fixture.cost}`;
          ctx.fillStyle = purchased ? '#8aa19f' : '#7e8599';
          ctx.font = `${Math.max(9.2, Math.min(sx, sy) * 0.276)}px ui-monospace, monospace`;
          ctx.fillText(line, fp.x, fp.y + sy * 0.2);
          if(!purchased && progress > 0){
            ctx.strokeStyle = '#cfd2de';
            ctx.lineWidth = Math.max(1, Math.min(sx, sy) * 0.05);
            ctx.beginPath();
            ctx.arc(fp.x, fp.y - sy * 0.35, Math.max(4, Math.min(sx, sy) * 0.28), -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * (progress / 3));
            ctx.stroke();
          }
        }
      }

      const pp = toScreen(p.x, p.y, sx, sy, ox, oy, camX, camY);
      const hurtMix = clamp(state.hurtFlash * 3.2, 0, 1); const playerColor = `rgb(${Math.floor(115 + 120 * hurtMix)}, ${Math.floor(240 - 120 * hurtMix)}, ${Math.floor(255 - 140 * hurtMix)})`; ctx.fillStyle = playerColor; ctx.font = `${Math.max(14, Math.min(sx, sy) * 0.6)}px ui-monospace, monospace`; ctx.fillText(EMOJIS.player, pp.x, pp.y);
      if(state.effects.spinUntil > state.timeSec){
        ctx.strokeStyle = '#d4ff7a';
        ctx.lineWidth = Math.max(1.5, Math.min(sx, sy) * 0.07);
        ctx.beginPath();
        ctx.arc(pp.x, pp.y, Math.max(4, Math.min(sx, sy) * 0.36), 0, Math.PI * 2);
        ctx.stroke();
      }

      const selected = state.abilitySlots[state.selectedAbilityIndex] || state.abilitySlots[0];
      if(selected){
        if(selected.level <= 0){
          abilitySlotBtn.className = 'hotkey-slot empty';
          abilitySlotBtn.innerHTML = `${ABILITY_META[selected.id].name}<br>Offline<br>${ABILITY_META[selected.id].desc}`;
        } else {
          const ready = performance.now() >= selected.nextReadyAt;
          const remains = ready ? 'Ready' : `${((selected.nextReadyAt - performance.now()) / 1000).toFixed(1)}s`;
          abilitySlotBtn.className = `hotkey-slot ${ready ? 'ready' : 'cooling'}`;
          abilitySlotBtn.innerHTML = `${ABILITY_META[selected.id].name}<br>Lv ${selected.level} · ${selected.charges}/${selected.maxCharges}<br>${remains}`;
        }
      }

      shieldFill.style.width = `${(p.shield / Math.max(1, p.maxShield)) * 100}%`;
      hpFill.style.width = `${(p.hp / Math.max(1, p.maxHp)) * 100}%`;
      const bonusHp = Math.max(0, p.maxHp - BASE_PLAYER.maxHp);
      extraHpFill.style.width = `${(bonusHp / Math.max(1, p.maxHp)) * 100}%`;
      const roomTag = state.room === 'run' ? 'Run' : 'Safehouse';
      const currentLevel = currentDifficultyLevel();
      const levelTag = `Difficulty Lv ${currentLevel}`;
      stats.textContent = `💵${state.money} · Bank 💵${Math.floor(state.bankMoney)} · ${fmtTime(state.timeSec)} · ${roomTag} · ${getWeaponDrop(state.activeWeapon).name} · ${levelTag} · KOs ${state.kills}`;
      const inSafehouse = state.room === 'safehouse';
      safehouseControls.style.display = inSafehouse ? 'flex' : 'none';
      shopBtn.textContent = state.shopOpen ? 'Upgrades ◀' : 'Upgrades ▶';
      playLayout.classList.toggle('shop-open', inSafehouse && state.shopOpen);
      shopPanel.style.display = inSafehouse && state.shopOpen ? 'block' : 'none';
      deathNote.textContent = state.interactPrompt || state.deathNote;
    }


    let last = performance.now();
    function loop(){
      requestAnimationFrame(loop);
      const now = performance.now();
      const dt = Math.min(0.05, (now-last)/1000);
      last = now;
      if(state.paused) return;
      state.timeSec += dt;
      inputLogic(dt);
      if(state.room === 'run'){
        spawnLogic();
        whipTick(dt);
        garlicTick(dt);
        batsTick(dt);
        cloneLogic(dt);
        abilityEffectsLogic(dt);
        bulletLogic(dt);
        enemyLogic(dt);
        forceFieldLogic(dt);
        fxLogic(dt);
        state.hurtFlash = Math.max(0, state.hurtFlash - dt * 1.8);
        pickupGems(dt);
      }
      updateSafehouseFixturePads(dt);
      updateDoorState(dt);
      render();

      if(state.player.hp <= 0 && state.room === 'run'){
        applyDeathPenalty();
        state.player.hp = state.player.maxHp;
        setupSafehouse();
      }
    }

    boot().catch(err => {
      resizeScreenCanvas();
      screenCtx.fillStyle = '#080b12';
      screenCtx.fillRect(0, 0, screen.width, screen.height);
      screenCtx.fillStyle = '#ffd8d8';
      screenCtx.font = `${Math.max(12, Math.floor(screen.height * 0.04))}px ui-monospace, monospace`;
      screenCtx.fillText('Failed to load JSON files.', 16, 28);
      screenCtx.fillText('Serve files over HTTP (not file://).', 16, 52);
      screenCtx.fillText(err.message, 16, 76);
      console.error(err);
    });
  </script>
</body>
</html>
